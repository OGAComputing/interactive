<!DOCTYPE html>
<html lang="en">
<head>
<!-- ACTIVITY
title:  Activity Title
type:   Practice
stars:  3
desc:   Short description shown on the hub card (one sentence).
color:  blue
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Title — Year 9</title>

<!--
  Google Fonts — remove this link if you want to avoid the network request.
  Year 9 standard fonts: DM Sans (body) + Space Mono (headings/code).
  If removing, the font-body/font-head variables in shared.css fall back
  to system fonts automatically.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap">

<!-- Shared reset, year-group palette, and ac-* utilities -->
<link rel="stylesheet" href="../../shared.css">

<style>
  /* ── Page heading ────────────────────────────────────── */

  .page-eyebrow {
    font-family: var(--font-head);
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    margin-bottom: 4px;
  }
  .page-title {
    font-size: 1.6rem;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    margin-bottom: 6px;
  }
  .page-subtitle {
    text-align: center;
    font-family: var(--font-head);
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  /* ── Pill tab bar ────────────────────────────────────── */

  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .tab-btn {
    padding: 8px 22px;
    border: 2px solid var(--surface-mid);
    border-radius: 20px;
    background: var(--surface);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    user-select: none;
  }
  .tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .tab-btn.active   { background: var(--accent);    border-color: var(--accent);    color: var(--text-inv); }
  .tab-btn.done-green { background: var(--green);   border-color: var(--green);     color: #fff; }
  .tab-btn.done-gold  { background: var(--gold);    border-color: var(--gold);      color: #111; }

  /* ── Panels ──────────────────────────────────────────── */

  .panel {
    display: none;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 16px 60px;
    animation: ac-fade-in 0.2s ease;
  }
  .panel.active { display: block; }

  /* ── Section card ────────────────────────────────────── */

  .card {
    background: var(--surface);
    border: 1px solid var(--surface-mid);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--font-head);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  /* ── Goal banner ─────────────────────────────────────── */

  .goal {
    background: var(--surface);
    border-left: 4px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 20px;
  }

  /* ── Feedback line ───────────────────────────────────── */

  .feedback {
    min-height: 1.4em;
    font-size: 0.88rem;
    font-weight: 600;
    margin-top: 12px;
  }
  .feedback.correct { color: var(--green); }
  .feedback.wrong   { color: var(--red); animation: ac-shake 0.35s ease; }

  /* ── Progress dots ───────────────────────────────────── */

  .progress-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
  }
  .pdot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--surface-mid);
    transition: background 0.3s;
  }
  .pdot.done  { background: var(--gold); }
  .pdot.green { background: var(--green); }

  /* ── Row layout helper ───────────────────────────────── */

  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 14px; }

  /* ── Page wrapper padding ────────────────────────────── */

  .page-wrap { padding: 32px 16px 0; }
</style>
</head>

<body data-year="9" data-topic="Hardware_Networks">
<!--
  Change data-topic to match the folder name:
  Hardware_Networks | Algorithms | Cybersecurity | Databases
  (or add a new entry to shared.css if needed)
-->

<!-- Completion banner -->
<div id="done-banner" class="ac-banner gold">
  🏆 All tasks complete — excellent work!
</div>

<div class="page-wrap">
  <!-- Page heading -->
  <div class="page-eyebrow">Year 9 · Hardware &amp; Networks</div>
  <h1 class="page-title">Activity Title</h1>
  <p class="page-subtitle">Topic / Unit Name</p>

  <!-- Progress dots — one per task -->
  <div class="progress-row">
    <div class="pdot" id="dot-0"></div>
    <div class="pdot" id="dot-1"></div>
  </div>

  <!-- Pill tabs — one per task -->
  <div class="tabs" id="tab-bar">
    <button class="tab-btn active" data-idx="0">Task 1</button>
    <button class="tab-btn"        data-idx="1">Task 2</button>
  </div>

  <!-- ── Task 1 ─────────────────────────────────────────── -->
  <div class="panel active" id="panel-0">
    <div class="goal">🎯 What the student needs to do or produce.</div>

    <div class="card">
      <div class="card-title">Instructions</div>
      <!-- Your task content here -->
      <p style="color:var(--text); font-size:0.9rem; line-height:1.7;">
        Task 1 content goes here.
      </p>
    </div>

    <div class="row">
      <button class="ac-btn" onclick="checkTask(0)">Check answer</button>
    </div>
    <div class="feedback" id="feedback-0"></div>
  </div>

  <!-- ── Task 2 ─────────────────────────────────────────── -->
  <div class="panel" id="panel-1">
    <div class="goal">🎯 What the student needs to do or produce.</div>

    <div class="card">
      <div class="card-title">Instructions</div>
      <!-- Your task content here -->
      <p style="color:var(--text); font-size:0.9rem; line-height:1.7;">
        Task 2 content goes here.
      </p>
    </div>

    <div class="row">
      <button class="ac-btn" onclick="checkTask(1)">Check answer</button>
    </div>
    <div class="feedback" id="feedback-1"></div>
  </div>
</div><!-- /.page-wrap -->

<!-- Toast for Classroom feedback -->
<div class="ac-toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  const TASK_COUNT = 2;                          // update if you add/remove tasks
  const completed  = new Array(TASK_COUNT).fill(false);

  // ── Tab switching ──────────────────────────────────────
  document.getElementById('tab-bar').addEventListener('click', e => {
    const tab = e.target.closest('.tab-btn');
    if (!tab) return;
    const idx = +tab.dataset.idx;

    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    tab.classList.add('active');
    document.getElementById('panel-' + idx).classList.add('active');
  });

  // ── Check answer ───────────────────────────────────────
  function checkTask(idx) {
    if (!window.Classroom?.verifyAuth()) return;

    // TODO: replace this stub with your actual answer-checking logic.
    const isCorrect = true;

    const feedback = document.getElementById('feedback-' + idx);
    if (isCorrect) {
      feedback.textContent = '✅ Correct!';
      feedback.className   = 'feedback correct';
      markDone(idx, 'gold');
    } else {
      feedback.textContent = '❌ Not quite — try again.';
      feedback.className   = 'feedback wrong';
    }
  }

  // ── Mark a task done ───────────────────────────────────
  // type: 'green' (all correct) | 'gold' (complete with help)
  function markDone(idx, type = 'gold') {
    if (completed[idx]) return;
    completed[idx] = true;

    document.getElementById('dot-' + idx).className = type === 'green' ? 'pdot green' : 'pdot done';

    const tab = document.querySelector('.tab-btn[data-idx="' + idx + '"]');
    if (tab) tab.classList.add('done-' + type);

    if (completed.every(Boolean)) {
      allComplete();
    }
  }

  // ── All tasks complete ─────────────────────────────────
  function allComplete() {
    document.getElementById('done-banner').classList.add('show');
    window.Classroom?.submitGrade(100, 'Activity Title');
  }

  // ── Toast helper ───────────────────────────────────────
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'ac-toast show' + (type ? ' ' + type : '');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>

<!-- Google Classroom integration (no-op when no ?courseId= param) -->
<script src="../../classroom.js"></script>
</body>
</html>
