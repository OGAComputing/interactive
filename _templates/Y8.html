<!DOCTYPE html>
<html lang="en">
<head>
<!-- ACTIVITY
title:  Activity Title
type:   Practice
stars:  2
desc:   Short description shown on the hub card (one sentence).
color:  teal
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Title — Year 8 Python</title>

<!-- Shared reset, year-group palette, and ac-* utilities -->
<!-- NOTE: use ../../../shared.css if this file is inside a lesson subfolder (L1_…/file.html) -->
<link rel="stylesheet" href="../../shared.css">

<style>
  /* ── Activity header ─────────────────────────────────── */

  .header {
    background: var(--surface);
    padding: 18px 28px 14px;
    border-bottom: 4px solid var(--accent);
  }
  .header-title {
    font-family: var(--font-head);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-inv);
  }
  .header-sub {
    font-size: 0.82rem;
    color: var(--accent-light);
    margin-top: 3px;
  }
  /* Progress dots row below the title */
  .progress-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
  }
  .pdot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--surface-dim);
    border: 2px solid #3a5a7a;
    transition: background 0.3s, border-color 0.3s;
  }
  .pdot.correct { background: var(--green);  border-color: var(--green); }
  .pdot.wrong   { background: var(--red);    border-color: var(--red);   }
  .pdot.gold    { background: var(--gold);   border-color: var(--gold);  }

  /* ── Tab bar (underline style — Year 8 standard) ─────── */

  .tab-bar {
    display: flex;
    background: var(--surface-mid);
    padding: 0 20px;
    gap: 2px;
    overflow-x: auto;
    border-bottom: 1px solid #2a4060;
  }
  .tab {
    padding: 10px 18px 9px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover          { color: var(--accent-light); }
  .tab.active         { color: var(--text-inv); border-bottom-color: var(--accent); }
  .tab.done           { color: var(--gold);     border-bottom-color: var(--gold); }

  /* ── Panels ──────────────────────────────────────────── */

  .panel {
    display: none;
    padding: 28px 28px 48px;
    max-width: 920px;
    margin: 0 auto;
  }
  .panel.active { display: block; }

  /* ── Task header ─────────────────────────────────────── */

  .task-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .task-badge {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-inv);
    background: var(--accent);
    flex-shrink: 0;
  }
  .task-title {
    font-family: var(--font-head);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--surface);
  }

  /* ── Goal banner ─────────────────────────────────────── */

  .goal {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: #fff;
    border-left: 4px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--surface);
    margin-bottom: 18px;
  }

  /* ── Feedback line ───────────────────────────────────── */

  .feedback {
    min-height: 1.4em;
    font-size: 0.88rem;
    font-weight: 600;
    margin-top: 10px;
  }
  .feedback.correct { color: var(--green-dark); }
  .feedback.wrong   { color: var(--red); animation: ac-shake 0.35s ease; }

  /* ── Row layout helper ───────────────────────────────── */

  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
</style>
</head>

<body data-year="8" data-topic="Python">

<!-- Completion banner — shown when all tasks finished -->
<div id="done-banner" class="ac-banner gold">
  🏆 All tasks complete — great work!
</div>

<!-- Activity header -->
<div class="header">
  <div class="header-title">Activity Title</div>
  <div class="header-sub">Year 8 Python</div>
  <!-- One dot per task — add/remove to match task count -->
  <div class="progress-row" id="progress-row">
    <span class="pdot" id="dot-0"></span>
    <span class="pdot" id="dot-1"></span>
  </div>
</div>

<!-- Tab bar — one .tab per task -->
<div class="tab-bar" id="tab-bar">
  <button class="tab active" data-idx="0">Task 1</button>
  <button class="tab"        data-idx="1">Task 2</button>
</div>

<!-- ── Task 1 ───────────────────────────────────────────── -->
<div class="panel active" id="panel-0">
  <div class="task-header">
    <div class="task-badge">1</div>
    <div>
      <div class="task-title">Task 1 Title</div>
    </div>
  </div>

  <div class="goal">🎯 What the student needs to do or produce.</div>

  <!-- Your task content here -->
  <p style="color:var(--muted); font-size:0.9rem;">Task 1 content goes here.</p>

  <div class="row">
    <button class="ac-btn" onclick="checkTask(0)">Check answer</button>
  </div>
  <div class="feedback" id="feedback-0"></div>
</div>

<!-- ── Task 2 ───────────────────────────────────────────── -->
<div class="panel" id="panel-1">
  <div class="task-header">
    <div class="task-badge">2</div>
    <div>
      <div class="task-title">Task 2 Title</div>
    </div>
  </div>

  <div class="goal">🎯 What the student needs to do or produce.</div>

  <!-- Your task content here -->
  <p style="color:var(--muted); font-size:0.9rem;">Task 2 content goes here.</p>

  <div class="row">
    <button class="ac-btn" onclick="checkTask(1)">Check answer</button>
  </div>
  <div class="feedback" id="feedback-1"></div>
</div>

<!-- Toast for Classroom feedback -->
<div class="ac-toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  const TASK_COUNT = 2;                          // update if you add/remove tasks
  const completed  = new Array(TASK_COUNT).fill(false);

  // ── Tab switching ──────────────────────────────────────
  document.getElementById('tab-bar').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    const idx = +tab.dataset.idx;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    tab.classList.add('active');
    document.getElementById('panel-' + idx).classList.add('active');
  });

  // ── Check answer ───────────────────────────────────────
  function checkTask(idx) {
    if (!window.Classroom?.verifyAuth()) return;

    // TODO: replace this stub with your actual answer-checking logic.
    const isCorrect = true;

    const feedback = document.getElementById('feedback-' + idx);
    if (isCorrect) {
      feedback.textContent = '✅ Correct!';
      feedback.className   = 'feedback correct';
      markDone(idx);
    } else {
      feedback.textContent = '❌ Not quite — try again.';
      feedback.className   = 'feedback wrong';
    }
  }

  // ── Mark a task done ───────────────────────────────────
  function markDone(idx) {
    if (completed[idx]) return;
    completed[idx] = true;

    document.getElementById('dot-' + idx).className = 'pdot gold';

    const tab = document.querySelector('.tab[data-idx="' + idx + '"]');
    if (tab) tab.classList.add('done');

    if (completed.every(Boolean)) {
      allComplete();
    }
  }

  // ── All tasks complete ─────────────────────────────────
  function allComplete() {
    document.getElementById('done-banner').classList.add('show');
    window.Classroom?.submitGrade(100, 'Activity Title');
  }

  // ── Toast helper ───────────────────────────────────────
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'ac-toast show' + (type ? ' ' + type : '');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>

<!-- Google Classroom integration (no-op when no ?courseId= param) -->
<!-- NOTE: use ../../../classroom.js if this file is inside a lesson subfolder (L1_…/file.html) -->
<script src="../../classroom.js"></script>
</body>
</html>
