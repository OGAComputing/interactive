<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
  <title>CS Activities</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Trebuchet MS', Calibri, sans-serif;
      background: #0f1c2e;
      color: #e8edf2;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #0a1520;
      border-bottom: 3px solid #00b4b4;
      padding: 2rem 2.5rem 1.5rem;
    }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .header-eyebrow {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #00b4b4;
      margin-bottom: 0.4rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
    }
    header h1 span { color: #00b4b4; }
    .header-sub {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #7a9ab5;
    }

    /* ── Teacher Dashboard ── */
    .teacher-tools {
      background: #162032;
      border: 1px solid #1e3048;
      border-radius: 8px;
      padding: 1rem;
      max-width: 1100px;
      margin: 1rem auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .teacher-label { font-size: 0.75rem; font-weight: 700; color: #00b4b4; text-transform: uppercase; }
    .btn-google {
      background: #fff; color: #000; padding: 6px 12px; border-radius: 4px;
      font-size: 0.8rem; font-weight: 700; border: none; cursor: pointer;
    }
    #course-select {
      background: #0a1520; color: #e8edf2; border: 1px solid #1e3048;
      padding: 5px; border-radius: 4px; font-size: 0.8rem; display: none;
    }
    .btn-assign {
      background: #00b4b4; color: #0a1520; 
      padding: 4px 8px; border-radius: 4px; border: none;
      font-size: 0.7rem; font-weight: 700; cursor: pointer;
      display: none; /* Only show when teacher is logged in */
      margin-top: 5px;
      align-self: flex-start;
    }
    .btn-assign:hover { background: #00ffff; }

    /* ── Year tabs ── */
    #year-tabs {
      background: #0d1828;
      border-bottom: 1px solid #1e3048;
      padding: 0 2.5rem;
      display: flex;
      gap: 0;
      max-width: 100%;
      overflow-x: auto;
    }
    .year-tab {
      padding: 0.85rem 1.4rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: #7a9ab5;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .year-tab:hover { color: #c8d8e8; }
    .year-tab.active {
      color: #00b4b4;
      border-bottom-color: #00b4b4;
    }

    /* ── Main ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 2.5rem 4rem;
    }

    /* ── Year panel ── */
    .year-panel { display: none; }
    .year-panel.active { display: block; }

    /* ── Topic groups ── */
    .topic-group { margin-bottom: 2.5rem; }
    .topic-heading {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a9ab5;
      border-bottom: 1px solid #1e3048;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    /* ── Lesson groups (within a topic) ── */
    .lesson-group { margin-bottom: 1.5rem; }
    .lesson-heading {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #3d6080;
      margin-bottom: 0.65rem;
    }
    .lesson-heading span {
      color: #00b4b4;
      margin-right: 0.5em;
    }

    .card-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    /* ── Cards ── */
    .card {
      background: #162032;
      border-radius: 8px;
      padding: 1.1rem 1.2rem 1rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #0a1520;
      padding: 0.2em 0.6em;
      border-radius: 4px;
    }
    .stars { font-size: 0.75rem; color: #f5a623; }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.25;
    }
    .card-desc {
      font-size: 0.8rem;
      color: #7a9ab5;
      line-height: 1.4;
      flex: 1;
    }
    .card-arrow {
      font-size: 0.78rem;
      font-weight: 600;
      color: #00b4b4;
      margin-top: 0.3rem;
    }

    /* ── Loading / error ── */
    #status {
      font-size: 0.9rem;
      color: #7a9ab5;
      padding: 2rem 0;
    }
    #status.error { color: #e05555; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #2a4060;
      padding: 1.5rem;
    }
    footer a { color: #3a6080; text-decoration: none; }
    footer a:hover { color: #7a9ab5; }

    /* ── Proxy helpers ── */
    .btn-inline {
      background: #00b4b4; color: #0a1520;
      padding: 2px 10px; border-radius: 4px; border: none;
      font-size: 0.75rem; font-weight: 700; cursor: pointer; vertical-align: middle;
    }
    .btn-inline:hover { background: #00ffff; }
    .btn-inline:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-inline-ghost {
      background: transparent; color: #7a9ab5;
      padding: 2px 8px; border-radius: 4px; border: 1px solid #1e3048;
      font-size: 0.75rem; cursor: pointer; vertical-align: middle;
    }
    .btn-inline-ghost:hover { color: #c8d8e8; border-color: #3a6080; }
    #hub-proxy-row {
      display: none; flex-basis: 100%; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    #hub-proxy-row.visible { display: flex; }
    #hub-proxy-input {
      flex: 1; min-width: 200px;
      background: #0a1520; color: #e8edf2; border: 1px solid #1e3048;
      padding: 4px 8px; border-radius: 4px; font-size: 0.78rem;
      font-family: 'Courier New', monospace;
    }
    #hub-proxy-input:focus { outline: none; border-color: #00b4b4; }

    #build-meta {
      font-size: 0.7rem;
      color: #1e3048;
      margin-top: 0.3rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">Computer Science</div>
    <h1>Activities <span>Hub</span></h1>

    <div class="teacher-tools">
      <span class="teacher-label">Teacher Tools:</span>
      <button id="btnLogin" class="btn-google" onclick="requestPermission()">Sign in to Assign to Classroom</button>
      <select id="course-select">
        <option value="">Select a class...</option>
      </select>
      <span id="teacher-status" style="font-size: 0.8rem; color: #7a9ab5;"></span>
      <a href="getting-started.html" style="font-size:0.75rem; color:#7a9ab5; text-decoration:none; margin-left:auto;" title="Teacher setup guide">New? Getting Started →</a>
      <div id="hub-proxy-row">
        <span style="font-size:0.78rem;color:#7a9ab5;white-space:nowrap">Proxy URL:</span>
        <input id="hub-proxy-input" type="url" placeholder="https://script.google.com/macros/s/…/exec">
        <button class="btn-inline" onclick="saveHubProxyUrl()">Save</button>
        <button class="btn-inline-ghost" onclick="document.getElementById('hub-proxy-row').classList.remove('visible')">Cancel</button>
      </div>
    </div>

    <p class="header-sub">Select a year group, then choose an activity</p>
  </div>
</header>

<nav id="year-tabs"></nav>

<main>
  <div id="status">Loading activities…</div>
  <div id="content"></div>
</main>

<footer>
  Outwood Grange Academies Trust — CS Activities Hub &nbsp;|&nbsp;
  <a href="getting-started.html">Getting Started / Teacher Guide</a>
  <div id="build-meta"></div>
</footer>

<script>
  // ── Google Classroom Config ──────────────────────────────
  const GOOGLE_CONFIG = {
    clientId: '379663437881-iukh6qnkq8jmqtqko3qog0n6ohuhemmq.apps.googleusercontent.com', // Replace with your actual ID
    scopes: 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.coursework.me https://www.googleapis.com/auth/classroom.coursework.students'
  };

  let tokenClient;
  let accessToken = null;

  function initTokenClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CONFIG.clientId,
      scope: GOOGLE_CONFIG.scopes,
      callback: (tokenResponse) => {
        if (tokenResponse.error) {
          // Silent re-auth failed — restore sign-in button
          const btn = document.getElementById('btnLogin');
          if (btn) { btn.textContent = 'Sign in to Assign to Classroom'; btn.disabled = false; }
          return;
        }
        accessToken = tokenResponse.access_token;
        localStorage.setItem('oga_hub_autosignin', '1');
        document.getElementById('btnLogin').style.display = 'none';
        const storedProxy = localStorage.getItem('oga_proxy_url');
        if (storedProxy) {
          document.getElementById('course-select').style.display = 'inline-block';
          document.querySelectorAll('.btn-assign').forEach(btn => btn.style.display = 'block');
          fetchCourses();
        } else {
          showNoProxyOptions();
        }
      },
    });
    // Silently re-authenticate if previously signed in on this browser
    if (localStorage.getItem('oga_hub_autosignin')) {
      const btn = document.getElementById('btnLogin');
      if (btn) { btn.textContent = 'Signing in…'; btn.disabled = true; }
      tokenClient.requestAccessToken({prompt: ''});
    }
  }

  function requestPermission() {
    tokenClient.requestAccessToken();
  }

  async function fetchCourses() {
    const response = await fetch('https://classroom.googleapis.com/v1/courses?courseStates=ACTIVE', {
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    const data = await response.json();
    const select = document.getElementById('course-select');
    if (data.courses) {
      data.courses.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });
    }
  }

  async function assignToClassroom(activityPath, title) {
    const courseId = document.getElementById('course-select').value;
    if (!courseId) return alert("Select a class first!");

    const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '') + activityPath;
    const proxyUrl = localStorage.getItem('oga_proxy_url') || '';
    const activityUrl = `${baseUrl}?courseId=${courseId}${proxyUrl ? '&proxyUrl=' + encodeURIComponent(proxyUrl) : ''}`;

    const res = await fetch(`https://classroom.googleapis.com/v1/courses/${courseId}/courseWork`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${accessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        title: title,
        description: "Complete this interactive activity. Your grade will be automatically recorded.",
        materials: [{ link: { url: activityUrl } }],
        workType: "ASSIGNMENT",
        state: "PUBLISHED",
        maxPoints: 100
      })
    });

    if (res.ok) {
      alert(`"${title}" assigned to your class with automatic grade sync enabled.`);
    } else {
      console.error("Assignment creation failed:", await res.text());
      alert("Error creating assignment. Check console.");
    }
  }

  const COLOR = {
    teal:   { border: '#00b4b4', badge: '#00b4b4' },
    amber:  { border: '#f5a623', badge: '#f5a623' },
    red:    { border: '#e05555', badge: '#e05555' },
    green:  { border: '#2ecc71', badge: '#2ecc71' },
    blue:   { border: '#3b82f6', badge: '#3b82f6' },
    purple: { border: '#a855f7', badge: '#a855f7' },
    cyan:   { border: '#06b6d4', badge: '#06b6d4' },
    indigo: { border: '#6366f1', badge: '#6366f1' },
    orange: { border: '#f97316', badge: '#f97316' },
  };

  function stars(n) {
    if (!n) return '';
    const filled = Math.min(n, 5);
    return `<span class="stars">${'★'.repeat(filled)}${'☆'.repeat(Math.max(0, 4 - filled))}</span>`;
  }

  function slugify(str) {
    return str.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  }

  function renderCard(a) {
    const c = COLOR[a.color] || COLOR.teal;
    return `
      <a class="card" href="${a.path}" style="border-top:4px solid ${c.border}">
        <div class="card-top">
          <span class="badge" style="background:${c.badge}">${a.type}</span>
          ${stars(a.stars)}
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-desc">${a.desc}</div>
        <button class="btn-assign" onclick="event.preventDefault(); assignToClassroom('${a.path}', '${a.title}')">➕ Assign to Class</button>
        <div class="card-arrow">Open →</div>
      </a>`;
  }

  function buildUI(activities) {
    // ── Group: year → topic → lesson_num ('__none__' if unset) → {name, activities} ──
    const tree = {};
    activities.forEach(a => {
      if (!tree[a.year])          tree[a.year] = {};
      if (!tree[a.year][a.topic]) tree[a.year][a.topic] = {};
      const lKey = a.lesson_num != null ? String(a.lesson_num) : '__none__';
      if (!tree[a.year][a.topic][lKey]) {
        tree[a.year][a.topic][lKey] = { name: a.lesson || null, activities: [] };
      }
      tree[a.year][a.topic][lKey].activities.push(a);
    });

    const years = Object.keys(tree).sort();
    const tabsEl    = document.getElementById('year-tabs');
    const contentEl = document.getElementById('content');

    years.forEach((year, i) => {
      // Tab
      const tab = document.createElement('div');
      tab.className = 'year-tab' + (i === 0 ? ' active' : '');
      tab.textContent = year;
      tab.dataset.year = slugify(year);
      tab.addEventListener('click', () => switchYear(slugify(year)));
      tabsEl.appendChild(tab);

      // Panel
      const panel = document.createElement('div');
      panel.className = 'year-panel' + (i === 0 ? ' active' : '');
      panel.id = 'panel-' + slugify(year);

      Object.keys(tree[year]).sort().forEach(topic => {
        const lessonBuckets = tree[year][topic];

        // Sort lesson keys: ungrouped first, then numerically
        const lessonKeys = Object.keys(lessonBuckets).sort((a, b) => {
          if (a === '__none__') return -1;
          if (b === '__none__') return  1;
          return Number(a) - Number(b);
        });

        const hasLessons = lessonKeys.some(k => k !== '__none__');
        let topicContent = '';

        lessonKeys.forEach(lKey => {
          const { name, activities: acts } = lessonBuckets[lKey];
          const cards = acts.map(renderCard).join('');
          if (lKey === '__none__') {
            // No lesson — render cards directly (no subheading)
            topicContent += `<div class="card-row">${cards}</div>`;
          } else {
            const lessonLabel = name ? `<span>Lesson ${lKey}</span>${name}` : `Lesson ${lKey}`;
            topicContent += `
              <div class="lesson-group">
                <h3 class="lesson-heading">${lessonLabel}</h3>
                <div class="card-row">${cards}</div>
              </div>`;
          }
        });

        panel.innerHTML += `
          <div class="topic-group">
            <h2 class="topic-heading">${topic}</h2>
            ${topicContent}
          </div>`;
      });

      contentEl.appendChild(panel);
    });
  }

  function switchYear(yearSlug) {
    document.querySelectorAll('.year-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.year === yearSlug));
    document.querySelectorAll('.year-panel').forEach(p =>
      p.classList.toggle('active', p.id === 'panel-' + yearSlug));
  }

  // ── Fetch and render ─────────────────────────────────────
  fetch('activities.json?v=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('Could not load activities.json — ' + r.status);
      return r.json();
    })
    .then(activities => {
      document.getElementById('status').remove();
      buildUI(activities);
    })
    .catch(err => {
      const el = document.getElementById('status');
      el.className = 'error';
      el.textContent = 'Could not load activities: ' + err.message;
    });

  // ── Proxy helpers ────────────────────────────────────────

  function showNoProxyOptions() {
    document.getElementById('teacher-status').innerHTML =
      '⚠️ No proxy — ' +
      '<button class="btn-inline" onclick="findProxyInDrive()" id="btn-find-proxy">Search my Drive</button>' +
      ' &nbsp;·&nbsp; <button class="btn-inline-ghost" onclick="document.getElementById(\'hub-proxy-row\').classList.add(\'visible\')">Paste URL</button>' +
      ' &nbsp;·&nbsp; <a href="_teacher/setup.html" style="color:#7a9ab5;font-size:0.78rem;">new setup →</a>';
  }

  let driveSearchClient = null;

  function findProxyInDrive() {
    const btn = document.getElementById('btn-find-proxy');
    if (btn) { btn.textContent = '🔍 Searching…'; btn.disabled = true; }

    if (!driveSearchClient) {
      driveSearchClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CONFIG.clientId,
        scope: 'https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/script.deployments',
        callback: async (resp) => {
          if (resp.error) { showNoProxyOptions(); return; }
          const statusEl = document.getElementById('teacher-status');
          try {
            // Search Drive for the Apps Script file by name
            const searchRes = await fetch(
              'https://www.googleapis.com/drive/v3/files?' + new URLSearchParams({
                q: "mimeType='application/vnd.google-apps.script' and name='OGA Classroom Grade Proxy' and trashed=false",
                fields: 'files(id,name)',
                pageSize: 5
              }),
              { headers: { Authorization: `Bearer ${resp.access_token}` } }
            );
            const { files } = await searchRes.json();
            if (!files || files.length === 0) {
              statusEl.innerHTML =
                '⚠️ No proxy found in Drive — ' +
                '<button class="btn-inline-ghost" onclick="document.getElementById(\'hub-proxy-row\').classList.add(\'visible\')">Paste URL</button>' +
                ' &nbsp;·&nbsp; <a href="_teacher/setup.html" style="color:#7a9ab5;font-size:0.78rem;">new setup →</a>';
              return;
            }
            // Get the web app deployment URL from the Script API
            const depRes = await fetch(
              `https://script.googleapis.com/v1/projects/${files[0].id}/deployments`,
              { headers: { Authorization: `Bearer ${resp.access_token}` } }
            );
            const depData = await depRes.json();
            const webAppDep = (depData.deployments || []).find(d =>
              (d.entryPoints || []).some(ep => ep.entryPointType === 'WEB_APP')
            );
            const ep = webAppDep?.entryPoints?.find(ep => ep.entryPointType === 'WEB_APP');
            const url = ep?.webApp?.url;
            if (url) {
              try { localStorage.setItem('oga_proxy_url', url); } catch (_) {}
              document.getElementById('course-select').style.display = 'inline-block';
              document.querySelectorAll('.btn-assign').forEach(b => b.style.display = 'block');
              fetchCourses();
              statusEl.textContent = '✅ Proxy URL found and saved.';
            } else {
              statusEl.innerHTML =
                '⚠️ Proxy script found but not yet deployed — ' +
                '<a href="_teacher/setup.html" style="color:#00b4b4;font-size:0.78rem;">re-run setup →</a>';
            }
          } catch (e) {
            console.error('Drive proxy search failed:', e);
            showNoProxyOptions();
          }
        }
      });
    }
    driveSearchClient.requestAccessToken();
  }

  function saveHubProxyUrl() {
    const input = document.getElementById('hub-proxy-input');
    const url = input && input.value.trim();
    if (!url || !url.startsWith('https://')) {
      if (input) input.style.borderColor = '#e05555';
      return;
    }
    try { localStorage.setItem('oga_proxy_url', url); } catch (_) {}
    document.getElementById('hub-proxy-row').classList.remove('visible');
    document.getElementById('course-select').style.display = 'inline-block';
    document.querySelectorAll('.btn-assign').forEach(b => b.style.display = 'block');
    fetchCourses();
    document.getElementById('teacher-status').textContent = '✅ Proxy URL saved.';
  }

  // ── Fetch build metadata for footer ──────────────────────
  fetch('meta.json?v=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(meta => {
      if (!meta) return;
      document.getElementById('build-meta').textContent =
        `${meta.version} · ${meta.deployed} · ${meta.activities} activities · ${meta.sha}`;
    })
    .catch(() => {}); // Fail silently — meta.json may not exist on first deploy
</script>

</body>
</html>
