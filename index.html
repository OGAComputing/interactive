<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CS Activities</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Trebuchet MS', Calibri, sans-serif;
      background: #0f1c2e;
      color: #e8edf2;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #0a1520;
      border-bottom: 3px solid #00b4b4;
      padding: 2rem 2.5rem 1.5rem;
    }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .header-eyebrow {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #00b4b4;
      margin-bottom: 0.4rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
    }
    header h1 span { color: #00b4b4; }
    .header-sub {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #7a9ab5;
    }

    /* ── Teacher Dashboard ── */
    .teacher-tools {
      background: #162032;
      border: 1px solid #1e3048;
      border-radius: 8px;
      padding: 1rem;
      max-width: 1100px;
      margin: 1rem auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .teacher-label { font-size: 0.75rem; font-weight: 700; color: #00b4b4; text-transform: uppercase; }
    .btn-google {
      background: #fff; color: #000; padding: 6px 12px; border-radius: 4px;
      font-size: 0.8rem; font-weight: 700; border: none; cursor: pointer;
    }
    #course-combobox, #topic-combobox {
      position: relative;
      display: none;
      flex-shrink: 0;
    }
    #course-search, #topic-search {
      background: #0a1520; color: #e8edf2; border: 1px solid #1e3048;
      padding: 5px 26px 5px 8px; border-radius: 4px; font-size: 0.8rem;
      width: 200px; font-family: inherit;
    }
    #topic-search { width: 220px; }
    #course-search:focus, #topic-search:focus { outline: none; border-color: #00b4b4; }
    #course-search::placeholder, #topic-search::placeholder { color: #3a6080; }
    #course-chevron, #topic-chevron {
      position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: #3a6080; font-size: 0.6rem;
    }
    #course-dropdown, #topic-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 100%;
      max-height: 220px;
      overflow-y: auto;
      background: #0d1828;
      border: 1px solid #1e3048;
      border-radius: 4px;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #course-dropdown.open, #topic-dropdown.open { display: block; }
    .course-option {
      padding: 7px 10px;
      font-size: 0.8rem;
      color: #c8d8e8;
      cursor: pointer;
      white-space: nowrap;
    }
    .course-option:hover, .course-option.focused { background: #162032; color: #fff; }
    .course-option.selected { color: #00b4b4; }
    .course-no-match { padding: 7px 10px; font-size: 0.8rem; color: #3a6080; }
    .btn-assign {
      background: #00b4b4; color: #0a1520;
      padding: 4px 8px; border-radius: 4px; border: none;
      font-size: 0.7rem; font-weight: 700; cursor: pointer;
      display: none;
      margin-top: 5px;
      align-self: flex-start;
    }
    body.teacher-mode .btn-assign { display: block; }
    .btn-assign:hover { background: #00ffff; }

    /* ── Year tabs ── */
    #year-tabs {
      background: #0d1828;
      border-bottom: 1px solid #1e3048;
      padding: 0 2.5rem;
      display: flex;
      gap: 0;
      max-width: 100%;
      overflow-x: auto;
    }
    .year-tab {
      padding: 0.85rem 1.4rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: #7a9ab5;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .year-tab:hover { color: #c8d8e8; }
    .year-tab.active {
      color: #00b4b4;
      border-bottom-color: #00b4b4;
    }

    /* ── Main ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 2.5rem 4rem;
    }

    /* ── Year panel ── */
    .year-panel { display: none; }
    .year-panel.active { display: block; }

    /* ── Topic groups ── */
    .topic-group { margin-bottom: 2.5rem; }
    .topic-heading {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a9ab5;
      border-bottom: 1px solid #1e3048;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    /* ── Lesson groups (within a topic) ── */
    .lesson-group { margin-bottom: 1.5rem; }
    .lesson-heading {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #3d6080;
      margin-bottom: 0.65rem;
    }
    .lesson-heading span {
      color: #00b4b4;
      margin-right: 0.5em;
    }

    .card-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    /* ── Cards ── */
    .card {
      background: #162032;
      border-radius: 8px;
      padding: 1.1rem 1.2rem 1rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #0a1520;
      padding: 0.2em 0.6em;
      border-radius: 4px;
    }
    .stars { font-size: 0.75rem; color: #f5a623; }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.25;
    }
    .card-desc {
      font-size: 0.8rem;
      color: #7a9ab5;
      line-height: 1.4;
      flex: 1;
    }
    .card-arrow {
      font-size: 0.78rem;
      font-weight: 600;
      color: #00b4b4;
      margin-top: 0.3rem;
    }

    /* ── Loading / error ── */
    #status {
      font-size: 0.9rem;
      color: #7a9ab5;
      padding: 2rem 0;
    }
    #status.error { color: #e05555; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #2a4060;
      padding: 1.5rem;
    }
    footer a { color: #3a6080; text-decoration: none; }
    footer a:hover { color: #7a9ab5; }

    /* ── Proxy helpers ── */
    .btn-inline {
      background: #00b4b4; color: #0a1520;
      padding: 2px 10px; border-radius: 4px; border: none;
      font-size: 0.75rem; font-weight: 700; cursor: pointer; vertical-align: middle;
    }
    .btn-inline:hover { background: #00ffff; }
    .btn-inline:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-inline-ghost {
      background: transparent; color: #7a9ab5;
      padding: 2px 8px; border-radius: 4px; border: 1px solid #1e3048;
      font-size: 0.75rem; cursor: pointer; vertical-align: middle;
    }
    .btn-inline-ghost:hover { color: #c8d8e8; border-color: #3a6080; }
    #hub-proxy-row {
      display: none; flex-basis: 100%; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    #hub-proxy-row.visible { display: flex; }
    #hub-proxy-input {
      flex: 1; min-width: 200px;
      background: #0a1520; color: #e8edf2; border: 1px solid #1e3048;
      padding: 4px 8px; border-radius: 4px; font-size: 0.78rem;
      font-family: 'Courier New', monospace;
    }
    #hub-proxy-input:focus { outline: none; border-color: #00b4b4; }

    #build-meta {
      font-size: 0.7rem;
      color: #1e3048;
      margin-top: 0.3rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">Computer Science</div>
    <h1>Activities <span>Hub</span></h1>

    <div class="teacher-tools">
      <span class="teacher-label">Teacher Tools:</span>
      <button id="btnLogin" class="btn-google" onclick="requestPermission()">Sign in to Assign to Classroom</button>
      <div id="course-combobox">
        <input id="course-search" type="text" placeholder="Select a class…" autocomplete="off" readonly>
        <span id="course-chevron">▼</span>
        <div id="course-dropdown"></div>
      </div>
      <div id="topic-combobox">
        <input id="topic-search" type="text" placeholder="Select a topic (optional)…" autocomplete="off">
        <span id="topic-chevron">▼</span>
        <div id="topic-dropdown"></div>
      </div>
      <span id="teacher-status" style="font-size: 0.8rem; color: #7a9ab5;"></span>
      <a href="getting-started.html" style="font-size:0.75rem; color:#7a9ab5; text-decoration:none; margin-left:auto;" title="Teacher setup guide">New? Getting Started →</a>
      <div id="hub-proxy-row">
        <span style="font-size:0.78rem;color:#7a9ab5;white-space:nowrap">Proxy URL:</span>
        <input id="hub-proxy-input" type="url" placeholder="https://script.google.com/macros/s/…/exec">
        <button class="btn-inline" onclick="saveHubProxyUrl()">Save</button>
        <button class="btn-inline-ghost" onclick="document.getElementById('hub-proxy-row').classList.remove('visible')">Cancel</button>
      </div>
    </div>

    <p class="header-sub">Select a year group, then choose an activity</p>
  </div>
</header>

<nav id="year-tabs"></nav>

<main>
  <div id="status">Loading activities…</div>
  <div id="content"></div>
</main>

<footer>
  Outwood Grange Academies Trust — CS Activities Hub &nbsp;|&nbsp;
  <a href="getting-started.html">Getting Started / Teacher Guide</a>
  <div id="build-meta"></div>
</footer>

<script>
  // ── Google Classroom Config ──────────────────────────────
  const GOOGLE_CONFIG = {
    clientId: '379663437881-iukh6qnkq8jmqtqko3qog0n6ohuhemmq.apps.googleusercontent.com',
    // Drive + Script scopes combined so the teacher signs in once and "Search my Drive"
    // can reuse the same token without triggering a second popup/redirect.
    scopes: 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.coursework.me https://www.googleapis.com/auth/classroom.coursework.students https://www.googleapis.com/auth/classroom.topics https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/script.deployments'
  };

  let accessToken = null;

  // ── Redirect-based sign-in (no popup) ───────────────────
  // Navigates the whole page to Google's consent screen.
  // After sign-in Google redirects to /oauth-callback.html, which stores the
  // token in sessionStorage and bounces back here.

  function signInViaRedirect() {
    const params = new URLSearchParams({
      client_id    : GOOGLE_CONFIG.clientId,
      redirect_uri : window.location.origin + '/interactive/oauth-callback.html',
      response_type: 'token',
      scope        : GOOGLE_CONFIG.scopes,
      prompt       : 'select_account',
    });
    try { sessionStorage.setItem('oga_return_url', window.location.href); } catch (_) {}
    window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
  }

  function requestPermission() { signInViaRedirect(); }

  // Called after successful sign-in (from redirect or session restore).
  function onSignInSuccess(data) {
    accessToken = data.access_token;
    // Persist token for the rest of this browser session (survives page reloads).
    try { sessionStorage.setItem('oga_hub_token', JSON.stringify(data)); } catch (_) {}
    localStorage.setItem('oga_hub_autosignin', '1');
    document.getElementById('btnLogin').style.display = 'none';
    document.getElementById('teacher-status').textContent = '';
    document.getElementById('course-combobox').style.display = 'inline-block';
    document.body.classList.add('teacher-mode');
    fetchCourses();
    const storedProxy = localStorage.getItem('oga_proxy_url');
    if (!storedProxy) {
      showNoProxyOptions();
    }
  }

  // On page load: restore session if returning from redirect or if tab was reloaded.
  function checkPendingHubToken() {
    // 1. Returning from Google redirect — token left by oauth-callback.html
    let json = null;
    try { json = sessionStorage.getItem('oga_oauth_token'); } catch (_) {}
    if (json) {
      try { sessionStorage.removeItem('oga_oauth_token'); } catch (_) {}
      let data;
      try { data = JSON.parse(json); } catch (_) {}
      if (data && data.access_token && (!data.expires_at || data.expires_at > Date.now() + 30000)) {
        onSignInSuccess(data);
        return;
      }
    }
    // 2. Same browser session — token stored after previous sign-in this session
    let sessionJson = null;
    try { sessionJson = sessionStorage.getItem('oga_hub_token'); } catch (_) {}
    if (sessionJson) {
      let data;
      try { data = JSON.parse(sessionJson); } catch (_) {}
      if (data && data.access_token && data.expires_at > Date.now() + 30000) {
        onSignInSuccess(data);
        return;
      }
      try { sessionStorage.removeItem('oga_hub_token'); } catch (_) {}
    }
    // 3. Previously signed in on this device (different session) — hint the button
    if (localStorage.getItem('oga_hub_autosignin')) {
      const btn = document.getElementById('btnLogin');
      if (btn) btn.textContent = 'Sign in again to Classroom';
    }
  }

  let allCourses = [];
  let selectedCourseId = '';
  let focusedIndex = -1;

  let allTopics = [];
  let selectedTopicId = '';
  let topicFocusedIndex = -1;

  async function fetchCourses() {
    const response = await fetch('https://classroom.googleapis.com/v1/courses?courseStates=ACTIVE', {
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    const data = await response.json();
    allCourses = data.courses || [];
    initCombobox();
    initTopicCombobox();
  }

  async function fetchTopics(courseId) {
    const topicCombobox = document.getElementById('topic-combobox');
    const topicSearch   = document.getElementById('topic-search');
    topicSearch.value = '';
    selectedTopicId   = '';
    allTopics         = [];
    topicCombobox.style.display = 'none';
    try {
      const res  = await fetch(`https://classroom.googleapis.com/v1/courses/${courseId}/topics`, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      const data = await res.json();
      allTopics  = (data.topic || []).sort((a, b) => a.name.localeCompare(b.name));
      if (allTopics.length > 0) {
        topicCombobox.style.display = 'inline-block';
        const lastTopicId = localStorage.getItem(`oga_last_topic_${courseId}`);
        if (lastTopicId) {
          const lastTopic = allTopics.find(t => t.topicId === lastTopicId);
          if (lastTopic) {
            selectedTopicId = lastTopic.topicId;
            topicSearch.value = lastTopic.name;
          }
        }
      }
    } catch (e) {
      console.error('Failed to fetch topics:', e);
    }
  }

  function initTopicCombobox() {
    const searchEl = document.getElementById('topic-search');
    const dropdown = document.getElementById('topic-dropdown');

    searchEl.addEventListener('focus', () => {
      renderTopicDropdown(searchEl.value);
      dropdown.classList.add('open');
      topicFocusedIndex = -1;
    });
    searchEl.addEventListener('input', () => {
      selectedTopicId = '';
      renderTopicDropdown(searchEl.value);
      dropdown.classList.add('open');
      topicFocusedIndex = -1;
    });
    searchEl.addEventListener('keydown', e => {
      const items = dropdown.querySelectorAll('.course-option');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        topicFocusedIndex = Math.min(topicFocusedIndex + 1, items.length - 1);
        updateTopicFocus(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        topicFocusedIndex = Math.max(topicFocusedIndex - 1, 0);
        updateTopicFocus(items);
      } else if (e.key === 'Enter') {
        if (topicFocusedIndex >= 0 && items[topicFocusedIndex]) items[topicFocusedIndex].click();
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
      }
    });
    document.addEventListener('click', e => {
      if (!document.getElementById('topic-combobox').contains(e.target)) {
        dropdown.classList.remove('open');
        if (!selectedTopicId) searchEl.value = '';
      }
    });
  }

  function renderTopicDropdown(query) {
    const dropdown = document.getElementById('topic-dropdown');
    const q = query.trim().toLowerCase();
    const filtered = q ? allTopics.filter(t => t.name.toLowerCase().includes(q)) : allTopics;
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="course-no-match">No topics match</div>';
      return;
    }
    dropdown.innerHTML = filtered.map(t => {
      const sel = t.topicId === selectedTopicId ? ' selected' : '';
      return `<div class="course-option${sel}" data-id="${t.topicId}" data-name="${t.name.replace(/"/g,'&quot;')}">${t.name}</div>`;
    }).join('');
    dropdown.querySelectorAll('.course-option').forEach(el => {
      el.addEventListener('click', () => {
        selectedTopicId = el.dataset.id;
        document.getElementById('topic-search').value = el.dataset.name;
        dropdown.classList.remove('open');
        topicFocusedIndex = -1;
        try { localStorage.setItem(`oga_last_topic_${selectedCourseId}`, selectedTopicId); } catch (_) {}
      });
    });
  }

  function updateTopicFocus(items) {
    items.forEach((el, i) => el.classList.toggle('focused', i === topicFocusedIndex));
    if (items[topicFocusedIndex]) items[topicFocusedIndex].scrollIntoView({ block: 'nearest' });
  }

  function initCombobox() {
    const searchEl = document.getElementById('course-search');
    const dropdown = document.getElementById('course-dropdown');

    renderDropdown('');

    searchEl.removeAttribute('readonly');
    searchEl.addEventListener('focus', () => {
      renderDropdown(searchEl.value);
      dropdown.classList.add('open');
      focusedIndex = -1;
    });

    searchEl.addEventListener('input', () => {
      selectedCourseId = '';
      renderDropdown(searchEl.value);
      dropdown.classList.add('open');
      focusedIndex = -1;
    });

    searchEl.addEventListener('keydown', e => {
      const items = dropdown.querySelectorAll('.course-option');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        focusedIndex = Math.min(focusedIndex + 1, items.length - 1);
        updateFocus(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        focusedIndex = Math.max(focusedIndex - 1, 0);
        updateFocus(items);
      } else if (e.key === 'Enter') {
        if (focusedIndex >= 0 && items[focusedIndex]) items[focusedIndex].click();
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
      }
    });

    document.addEventListener('click', e => {
      if (!document.getElementById('course-combobox').contains(e.target)) {
        dropdown.classList.remove('open');
        if (!selectedCourseId) searchEl.value = '';
      }
    });
  }

  function renderDropdown(query) {
    const dropdown = document.getElementById('course-dropdown');
    const q = query.trim().toLowerCase();
    const filtered = q ? allCourses.filter(c => c.name.toLowerCase().includes(q)) : allCourses;
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="course-no-match">No classes match</div>';
      return;
    }
    dropdown.innerHTML = filtered.map(c => {
      const sel = c.id === selectedCourseId ? ' selected' : '';
      return `<div class="course-option${sel}" data-id="${c.id}" data-name="${c.name.replace(/"/g,'&quot;')}">${c.name}</div>`;
    }).join('');
    dropdown.querySelectorAll('.course-option').forEach(el => {
      el.addEventListener('click', () => {
        selectedCourseId = el.dataset.id;
        document.getElementById('course-search').value = el.dataset.name;
        dropdown.classList.remove('open');
        focusedIndex = -1;
        fetchTopics(selectedCourseId);
      });
    });
  }

  function updateFocus(items) {
    items.forEach((el, i) => el.classList.toggle('focused', i === focusedIndex));
    if (items[focusedIndex]) items[focusedIndex].scrollIntoView({ block: 'nearest' });
  }

  async function assignToClassroom(activityPath, title) {
    const courseId = selectedCourseId;
    if (!courseId) return alert("Select a class first!");

    const proxyUrl = localStorage.getItem('oga_proxy_url') || '';

    // ── Pre-flight proxy check ────────────────────────────────────────────────
    // Validate the proxy before baking its URL into the assignment link.
    // A bad URL here is the #1 cause of silent grade-sync failures for students.
    if (!proxyUrl) {
      const proceed = confirm(
        'No proxy URL is configured.\n\n' +
        'Students will not have their grades recorded in Google Classroom.\n\n' +
        'Run the proxy setup first:\n  _teacher/setup.html\n\n' +
        'Assign without grade sync anyway?'
      );
      if (!proceed) return;
    } else {
      const health = await checkProxyHealth(proxyUrl);
      if (health === 'cors-blocked') {
        alert(
          'Cannot assign — proxy is blocked by CORS.\n\n' +
          'Your proxy script was deployed with "Who has access: Anyone with Google account" ' +
          'instead of "Anyone". Students will get a grade-sync error on every submission.\n\n' +
          'Fix: re-run the proxy setup (_teacher/setup.html) to deploy a fresh copy ' +
          'with the correct access setting, then assign again.'
        );
        return;
      }
      if (health === 'unreachable') {
        alert(
          'Cannot assign — proxy URL is not working.\n\n' +
          'The saved proxy URL returned a 404 or could not be reached. ' +
          'It may have been deleted or is from an old deployment.\n\n' +
          'Fix: re-run the proxy setup (_teacher/setup.html) to create a fresh proxy, ' +
          'then assign again.'
        );
        return;
      }
      if (health === 'version-mismatch') {
        alert(
          'Cannot assign — proxy script is outdated.\n\n' +
          'The proxy needs to be updated before it will work with the current version of classroom.js.\n\n' +
          'Fix: re-run the proxy setup (_teacher/setup.html) to update it, then assign again.'
        );
        return;
      }
    }
    // ── End proxy check ───────────────────────────────────────────────────────

    const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '') + activityPath;
    const activityUrl = `${baseUrl}?courseId=${courseId}${proxyUrl ? '&proxyUrl=' + encodeURIComponent(proxyUrl) : ''}`;

    const res = await fetch(`https://classroom.googleapis.com/v1/courses/${courseId}/courseWork`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${accessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        title: title,
        description: "Complete this interactive activity. Your grade will be automatically recorded.",
        materials: [{ link: { url: activityUrl } }],
        workType: "ASSIGNMENT",
        state: "PUBLISHED",
        maxPoints: 100,
        ...(selectedTopicId ? { topicId: selectedTopicId } : {})
      })
    });

    if (res.ok) {
      alert(`"${title}" assigned to your class with automatic grade sync enabled.`);
    } else {
      console.error("Assignment creation failed:", await res.text());
      alert("Error creating assignment. Check console.");
    }
  }

  const COLOR = {
    teal:   { border: '#00b4b4', badge: '#00b4b4' },
    amber:  { border: '#f5a623', badge: '#f5a623' },
    red:    { border: '#e05555', badge: '#e05555' },
    green:  { border: '#2ecc71', badge: '#2ecc71' },
    blue:   { border: '#3b82f6', badge: '#3b82f6' },
    purple: { border: '#a855f7', badge: '#a855f7' },
    cyan:   { border: '#06b6d4', badge: '#06b6d4' },
    indigo: { border: '#6366f1', badge: '#6366f1' },
    orange: { border: '#f97316', badge: '#f97316' },
  };

  function stars(n) {
    if (!n) return '';
    const filled = Math.min(n, 5);
    return `<span class="stars">${'★'.repeat(filled)}${'☆'.repeat(Math.max(0, 4 - filled))}</span>`;
  }

  function slugify(str) {
    return str.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  }

  function renderCard(a) {
    const c = COLOR[a.color] || COLOR.teal;
    return `
      <a class="card" href="${a.path}" style="border-top:4px solid ${c.border}">
        <div class="card-top">
          <span class="badge" style="background:${c.badge}">${a.type}</span>
          ${stars(a.stars)}
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-desc">${a.desc}</div>
        <button class="btn-assign" onclick="event.preventDefault(); assignToClassroom('${a.path}', '${a.title}')">➕ Assign to Class</button>
        <div class="card-arrow">Open →</div>
      </a>`;
  }

  function buildUI(activities) {
    // ── Group: year → topic → lesson_num ('__none__' if unset) → {name, activities} ──
    const tree = {};
    activities.forEach(a => {
      if (!tree[a.year])          tree[a.year] = {};
      if (!tree[a.year][a.topic]) tree[a.year][a.topic] = {};
      const lKey = a.lesson_num != null ? String(a.lesson_num) : '__none__';
      if (!tree[a.year][a.topic][lKey]) {
        tree[a.year][a.topic][lKey] = { name: a.lesson || null, activities: [] };
      }
      tree[a.year][a.topic][lKey].activities.push(a);
    });

    const years = Object.keys(tree).sort();
    const tabsEl    = document.getElementById('year-tabs');
    const contentEl = document.getElementById('content');

    years.forEach((year, i) => {
      // Tab
      const tab = document.createElement('div');
      tab.className = 'year-tab' + (i === 0 ? ' active' : '');
      tab.textContent = year;
      tab.dataset.year = slugify(year);
      tab.addEventListener('click', () => switchYear(slugify(year)));
      tabsEl.appendChild(tab);

      // Panel
      const panel = document.createElement('div');
      panel.className = 'year-panel' + (i === 0 ? ' active' : '');
      panel.id = 'panel-' + slugify(year);

      Object.keys(tree[year]).sort().forEach(topic => {
        const lessonBuckets = tree[year][topic];

        // Sort lesson keys: ungrouped first, then numerically
        const lessonKeys = Object.keys(lessonBuckets).sort((a, b) => {
          if (a === '__none__') return -1;
          if (b === '__none__') return  1;
          return Number(a) - Number(b);
        });

        const hasLessons = lessonKeys.some(k => k !== '__none__');
        let topicContent = '';

        lessonKeys.forEach(lKey => {
          const { name, activities: acts } = lessonBuckets[lKey];
          const cards = acts.map(renderCard).join('');
          if (lKey === '__none__') {
            // No lesson — render cards directly (no subheading)
            topicContent += `<div class="card-row">${cards}</div>`;
          } else {
            const lessonLabel = name ? `<span>Lesson ${lKey}</span>${name}` : `Lesson ${lKey}`;
            topicContent += `
              <div class="lesson-group">
                <h3 class="lesson-heading">${lessonLabel}</h3>
                <div class="card-row">${cards}</div>
              </div>`;
          }
        });

        panel.innerHTML += `
          <div class="topic-group">
            <h2 class="topic-heading">${topic}</h2>
            ${topicContent}
          </div>`;
      });

      contentEl.appendChild(panel);
    });
  }

  function switchYear(yearSlug) {
    document.querySelectorAll('.year-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.year === yearSlug));
    document.querySelectorAll('.year-panel').forEach(p =>
      p.classList.toggle('active', p.id === 'panel-' + yearSlug));
  }

  // ── Fetch and render ─────────────────────────────────────
  fetch('activities.json?v=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('Could not load activities.json — ' + r.status);
      return r.json();
    })
    .then(activities => {
      document.getElementById('status').remove();
      buildUI(activities);
    })
    .catch(err => {
      const el = document.getElementById('status');
      el.className = 'error';
      el.textContent = 'Could not load activities: ' + err.message;
    });

  // ── Proxy helpers ────────────────────────────────────────

  // Checks the proxy is reachable and returns the correct version.
  // Returns 'ok' | 'cors-blocked' | 'unreachable' | 'version-mismatch'.
  async function checkProxyHealth(url) {
    const PROXY_MIN_VERSION = 1;
    try {
      const res  = await fetch(url + '?action=version');
      const text = res.ok ? (await res.text()).trim() : '';
      const ver  = parseInt(text, 10);
      return (!isNaN(ver) && ver >= PROXY_MIN_VERSION) ? 'ok' : 'version-mismatch';
    } catch (_) {
      // fetch threw — could be CORS block or true network error.
      // A no-cors probe distinguishes: opaque response = reachable but CORS-blocked.
      try {
        const probe = await fetch(url + '?action=version', { mode: 'no-cors' });
        if (probe.type === 'opaque') return 'cors-blocked';
      } catch (_2) {}
      return 'unreachable';
    }
  }

  function showNoProxyOptions() {
    document.getElementById('teacher-status').innerHTML =
      '⚠️ No proxy — ' +
      '<button class="btn-inline" onclick="findProxyInDrive()" id="btn-find-proxy">Search my Drive</button>' +
      ' &nbsp;·&nbsp; <button class="btn-inline-ghost" onclick="document.getElementById(\'hub-proxy-row\').classList.add(\'visible\')">Paste URL</button>' +
      ' &nbsp;·&nbsp; <a href="_teacher/setup.html" style="color:#7a9ab5;font-size:0.78rem;">new setup →</a>';
  }

  async function findProxyInDrive() {
    // accessToken already has drive.metadata.readonly + script.deployments granted
    // at sign-in time, so no second OAuth flow is needed here.
    const btn      = document.getElementById('btn-find-proxy');
    const statusEl = document.getElementById('teacher-status');
    if (btn) { btn.textContent = '🔍 Searching…'; btn.disabled = true; }
    try {
      const searchRes = await fetch(
        'https://www.googleapis.com/drive/v3/files?' + new URLSearchParams({
          q: "mimeType='application/vnd.google-apps.script' and name='OGA Classroom Grade Proxy' and trashed=false",
          fields: 'files(id,name)',
          pageSize: 5
        }),
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const { files } = await searchRes.json();
      if (!files || files.length === 0) {
        statusEl.innerHTML =
          '⚠️ No proxy found in Drive — ' +
          '<button class="btn-inline-ghost" onclick="document.getElementById(\'hub-proxy-row\').classList.add(\'visible\')">Paste URL</button>' +
          ' &nbsp;·&nbsp; <a href="_teacher/setup.html" style="color:#7a9ab5;font-size:0.78rem;">new setup →</a>';
        return;
      }
      const depRes = await fetch(
        `https://script.googleapis.com/v1/projects/${files[0].id}/deployments`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const depData = await depRes.json();
      // Sort by updateTime descending so the most recently published version wins.
      // Skip HEAD deployment — its URL ends in /dev and requires editor-level auth.
      // NOTE: classroom.js has a duplicate of this logic in searchDriveForProxy() — keep in sync.
      const deployments = (depData.deployments || []).sort((a, b) =>
        new Date(b.updateTime) - new Date(a.updateTime)
      );
      let url = null;
      for (const dep of deployments) {
        const ep = (dep.entryPoints || []).find(ep =>
          ep.entryPointType === 'WEB_APP' && ep.webApp?.url?.endsWith('/exec')
        );
        if (ep) { url = ep.webApp.url; break; }
      }
      if (url) {
        try { localStorage.setItem('oga_proxy_url', url); } catch (_) {}
        document.getElementById('course-combobox').style.display = 'inline-block';
        document.body.classList.add('teacher-mode');
        fetchCourses();
        statusEl.textContent = '✅ Proxy URL found and saved.';
      } else {
        statusEl.innerHTML =
          '⚠️ Proxy script found but not yet deployed — ' +
          '<a href="_teacher/setup.html" style="color:#00b4b4;font-size:0.78rem;">re-run setup →</a>';
      }
    } catch (e) {
      console.error('Drive proxy search failed:', e);
      showNoProxyOptions();
    } finally {
      if (btn) { btn.textContent = '🔍 Search my Drive'; btn.disabled = false; }
    }
  }

  function saveHubProxyUrl() {
    const input = document.getElementById('hub-proxy-input');
    const url = input && input.value.trim();
    if (!url || !url.startsWith('https://')) {
      if (input) input.style.borderColor = '#e05555';
      return;
    }
    try { localStorage.setItem('oga_proxy_url', url); } catch (_) {}
    document.getElementById('hub-proxy-row').classList.remove('visible');
    document.getElementById('course-combobox').style.display = 'inline-block';
    document.body.classList.add('teacher-mode');
    fetchCourses();
    document.getElementById('teacher-status').textContent = '✅ Proxy URL saved.';
  }

  // ── Fetch build metadata for footer ──────────────────────
  fetch('meta.json?v=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(meta => {
      if (!meta) return;
      document.getElementById('build-meta').textContent =
        `${meta.version} · ${meta.deployed} · ${meta.activities} activities · ${meta.sha}`;
    })
    .catch(() => {}); // Fail silently — meta.json may not exist on first deploy

  // Restore sign-in state on every page load (handles redirect return and tab reloads).
  checkPendingHubToken();
</script>

</body>
