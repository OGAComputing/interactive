<!DOCTYPE html>
<!-- ACTIVITY
title:  Router vs Switch
lesson: Year 11 — Network Hardware
type:   Practice
stars:  2
desc:   Drag-and-drop Venn diagram sorting router-only, switch-only, and shared features of network devices
color:  red
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Router vs Switch — Venn Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #0d1b2e;
    --navy2:   #132238;
    --navy3:   #1c3050;
    --teal:    #2ec4b6;
    --teal2:   #1a9e92;
    --router:  #ff6b6b;
    --router2: #c94444;
    --switch:  #5b9cf6;
    --switch2: #3a78d8;
    --both:    #56d97e;
    --both2:   #35b85a;
    --gold:    #ffd166;
    --text:    #ddeeff;
    --muted:   #6a8aaa;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 40px;
    overflow-x: hidden;
  }

  body.bg-gold { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
  body.bg-green { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(46,196,182,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,196,182,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }

  /* Header */
  header { text-align: center; margin-bottom: 20px; }
  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 700;
    color: var(--teal);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  header p { font-size: 0.8rem; color: var(--muted); }

  /* Card Bank */
  #bank-section {
    background: var(--navy2);
    border: 2px solid var(--navy3);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 18px;
  }
  #bank-section h2 {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  #bank-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 44px;
  }

  /* Cards */
  .card {
    background: var(--navy3);
    border: 2px solid #2e4a6a;
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text);
    cursor: grab;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s, background 0.2s;
    line-height: 1.4;
    max-width: 240px;
  }
  .card:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 6px 18px rgba(0,0,0,0.4); border-color: var(--teal); }
  .card.dragging { opacity: 0.3; cursor: grabbing; }
  .card.correct { background: rgba(86,217,126,0.15); border-color: var(--both); color: #c8ffd8; }
  .card.incorrect { background: rgba(255,107,107,0.15); border-color: var(--router); color: #ffd0d0; }

  /* Venn Area */
  .venn-wrapper {
    margin-bottom: 16px;
  }

  .zone-labels {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    margin-bottom: 6px;
    padding: 0 8px;
  }
  .zone-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 10px;
    border-radius: 6px;
    text-align: center;
  }
  .zone-label.router { background: rgba(255,107,107,0.12); color: var(--router); border: 1px solid rgba(255,107,107,0.3); }
  .zone-label.both   { background: rgba(86,217,126,0.12);  color: var(--both);   border: 1px solid rgba(86,217,126,0.3);  margin: 0 8px; }
  .zone-label.switch { background: rgba(91,156,246,0.12);  color: var(--switch); border: 1px solid rgba(91,156,246,0.3);  }

  .venn-zones {
    display: grid;
    grid-template-columns: 1fr 160px 1fr;
    gap: 0;
    min-height: 260px;
    position: relative;
  }

  .zone {
    border: 2.5px dashed;
    min-height: 260px;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    align-items: center;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
  }
  .zone::after {
    content: attr(data-hint);
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.5;
    white-space: nowrap;
    pointer-events: none;
  }

  #zone-router {
    border-color: rgba(255,107,107,0.4);
    background: rgba(255,107,107,0.04);
    border-radius: 50% 0 0 50% / 50%;
    border-right: none;
    align-items: flex-start;
  }
  #zone-router.over { background: rgba(255,107,107,0.12); border-color: var(--router); }

  #zone-both {
    border-color: rgba(86,217,126,0.4);
    background: rgba(86,217,126,0.04);
    border-left: 2.5px dashed rgba(86,217,126,0.4);
    border-right: 2.5px dashed rgba(86,217,126,0.4);
    border-top: none;
    border-bottom: none;
    z-index: 2;
  }
  #zone-both.over { background: rgba(86,217,126,0.12); border-color: var(--both) !important; border-left-color: var(--both) !important; border-right-color: var(--both) !important; }

  #zone-switch {
    border-color: rgba(91,156,246,0.4);
    background: rgba(91,156,246,0.04);
    border-radius: 0 50% 50% 0 / 50%;
    border-left: none;
    align-items: flex-end;
  }
  #zone-switch.over { background: rgba(91,156,246,0.12); border-color: var(--switch); }

  /* Zone cards sizing */
  .zone .card {
    font-size: 0.68rem;
    padding: 6px 9px;
    width: 100%;
    max-width: 100%;
  }
  #zone-router .card { border-color: rgba(255,107,107,0.5); background: rgba(255,107,107,0.08); }
  #zone-both .card   { border-color: rgba(86,217,126,0.5);  background: rgba(86,217,126,0.08); text-align: center; }
  #zone-switch .card { border-color: rgba(91,156,246,0.5);  background: rgba(91,156,246,0.08); text-align: right; }

  /* Buttons */
  .btn-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 10px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
    letter-spacing: 0.3px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.35); }
  .btn:active { transform: translateY(0); }
  .btn-check  { background: linear-gradient(135deg, var(--both), var(--both2));   color: #0d2818; }
  .btn-reveal { background: linear-gradient(135deg, var(--gold), #e0a020);        color: #2a1800; }
  .btn-reset  { background: linear-gradient(135deg, var(--teal), var(--teal2));   color: #0d2a28; }

  /* Feedback panel */
  #feedback {
    background: var(--navy2);
    border: 2px solid var(--navy3);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 0.78rem;
    line-height: 1.7;
    display: none;
    margin-bottom: 12px;
  }
  #feedback.show { display: block; }
  .fb-score { font-size: 1rem; font-weight: 800; color: var(--teal); margin-bottom: 8px; }
  .fb-perfect { color: var(--both); font-weight: 700; }
  .fb-wrong-item { color: #ffaaaa; }
  .fb-wrong-item strong { color: var(--gold); }

  /* Success overlay */
  #success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
  }
  #success-overlay.show { display: block; }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 101;
  }

  /* Big success message */
  #success-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #0d2818, #0d3828);
    border: 3px solid var(--both);
    border-radius: 20px;
    padding: 30px 50px;
    text-align: center;
    z-index: 102;
    pointer-events: none;
    animation: none;
    box-shadow: 0 0 60px rgba(86,217,126,0.4);
  }
  #success-msg.show {
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes popIn {
    to { transform: translate(-50%, -50%) scale(1); }
  }
  #success-msg h2 { font-size: 2rem; color: var(--both); margin-bottom: 6px; }
  #success-msg p  { font-size: 1rem; color: var(--gold); font-weight: 700; }

  /* Zones go green on all-correct */
  .all-correct #zone-router { background: rgba(86,217,126,0.08) !important; border-color: var(--both) !important; }
  .all-correct #zone-both   { background: rgba(86,217,126,0.08) !important; border-left-color: var(--both) !important; border-right-color: var(--both) !important; }
  .all-correct #zone-switch { background: rgba(86,217,126,0.08) !important; border-color: var(--both) !important; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🌐 Router vs Switch</h1>
    <p>Drag each statement into the correct section of the Venn diagram</p>
  </header>

  <div id="bank-section">
    <h2>📦 Statement Bank — drag these into the diagram below</h2>
    <div id="bank-cards"></div>
  </div>

  <div class="venn-wrapper">
    <div class="zone-labels">
      <div class="zone-label router">🔴 Router Only</div>
      <div class="zone-label both">🟢 Both</div>
      <div class="zone-label switch">🔵 Switch Only</div>
    </div>
    <div class="venn-zones" id="venn-zones">
      <div class="zone" id="zone-router" data-zone="router" data-hint="Router only →"></div>
      <div class="zone" id="zone-both"   data-zone="both"   data-hint="← Both →"></div>
      <div class="zone" id="zone-switch" data-zone="switch" data-hint="← Switch only"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-check"  id="btn-check">✅ Check Answers</button>
    <button class="btn btn-reveal" id="btn-reveal">💡 Reveal Answers</button>
    <button class="btn btn-reset"  id="btn-reset">🔄 Reset</button>
  </div>

  <div id="feedback"></div>
</div>

<!-- Success celebration -->
<div id="success-overlay">
  <canvas id="confetti-canvas"></canvas>
  <div id="success-msg">
    <h2>🎉 Perfect!</h2>
    <p>10 / 10 — Full marks!</p>
  </div>
</div>

<script>
/* ── Data ───────────────────────────────────────────────── */
const CARDS = [
  { id:'c1',  text:'Receives packets / data',                             answer:'both'   },
  { id:'c2',  text:'Forwards / sends / transmits packets',                answer:'both'   },
  { id:'c3',  text:'Maintains a routing table',                           answer:'router' },
  { id:'c4',  text:'Identifies the most efficient path to the destination', answer:'router' },
  { id:'c5',  text:'Assigns IP addresses to nodes and devices',           answer:'router' },
  { id:'c6',  text:'Converts packets from one protocol to another',       answer:'router' },
  { id:'c7',  text:'Connects devices together on a network',              answer:'switch' },
  { id:'c8',  text:'Directs data only to its intended destination',       answer:'both'   },
  { id:'c9',  text:'Builds a list of connected devices as it receives signals', answer:'switch' },
  { id:'c10', text:'Uses MAC addresses of connected devices',             answer:'switch' },
];

/* ── State ──────────────────────────────────────────────── */
let draggedCard = null;
let everWrong = false;

/* ── localStorage key ───────────────────────────────────── */
const LS_KEY = 'router_switch_venn_y11_v1';

/* ── Helpers ────────────────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── Build a card element ───────────────────────────────── */
function makeCard(c) {
  const el = document.createElement('div');
  el.className = 'card';
  el.id = c.id;
  el.textContent = c.text;
  el.draggable = true;
  el.dataset.answer = c.answer;

  el.addEventListener('dragstart', e => {
    draggedCard = el;
    setTimeout(() => el.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    draggedCard = null;
  });

  // Touch support
  el.addEventListener('touchstart', touchStart, { passive: true });
  el.addEventListener('touchmove',  touchMove,  { passive: false });
  el.addEventListener('touchend',   touchEnd);

  return el;
}

/* ── Zone drop listeners ────────────────────────────────── */
function setupDropZone(zone) {
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('over');
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('over');
    if (draggedCard) {
      zone.appendChild(draggedCard);
      draggedCard.classList.remove('correct','incorrect');
    }
  });
}

/* ── Bank drop ──────────────────────────────────────────── */
function setupBank() {
  const bank = document.getElementById('bank-cards');
  bank.addEventListener('dragover', e => e.preventDefault());
  bank.addEventListener('drop', e => {
    e.preventDefault();
    if (draggedCard) {
      bank.appendChild(draggedCard);
      draggedCard.classList.remove('correct','incorrect');
    }
  });
}

/* ── Init ───────────────────────────────────────────────── */
function init() {
  // Reset everWrong
  everWrong = false;

  // Clear feedback / fireworks
  document.getElementById('feedback').className = '';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('success-overlay').classList.remove('show');
  document.getElementById('success-msg').classList.remove('show');
  document.getElementById('venn-zones').classList.remove('all-correct');
  stopConfetti();

  // Clear result banner
  const banner = document.getElementById('result-banner');
  if (banner) banner.style.display = 'none';

  // Clear fireworks canvas
  const fwCanvas = document.getElementById('fw-canvas');
  if (fwCanvas) {
    const fwCtx = fwCanvas.getContext('2d');
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  }

  // Remove body background classes
  document.body.classList.remove('bg-gold', 'bg-green');

  // Clear zones
  ['zone-router','zone-both','zone-switch'].forEach(id => {
    document.getElementById(id).innerHTML = '';
  });

  // Populate bank
  const bank = document.getElementById('bank-cards');
  bank.innerHTML = '';
  shuffle(CARDS).forEach(c => bank.appendChild(makeCard(c)));

  setupBank();
  ['zone-router','zone-both','zone-switch'].forEach(id =>
    setupDropZone(document.getElementById(id))
  );

  saveState();
}

/* ── Check answers ──────────────────────────────────────── */
function checkAnswers() {
  const fb = document.getElementById('feedback');
  let correct = 0;
  const wrong = [];
  const allPlaced = CARDS.every(c => {
    const el = document.getElementById(c.id);
    return el.parentElement.dataset.zone !== undefined;
  });

  if (!allPlaced) {
    const unplaced = CARDS.filter(c => !document.getElementById(c.id).parentElement.dataset.zone).length;
    fb.className = 'show';
    fb.innerHTML = `<p style="color:var(--gold)">⚠️ ${unplaced} card(s) still in the bank — place them all before checking!</p>`;
    return;
  }

  CARDS.forEach(c => {
    const el = document.getElementById(c.id);
    const placed = el.parentElement.dataset.zone;
    if (placed === c.answer) {
      el.classList.add('correct');
      el.classList.remove('incorrect');
      correct++;
    } else {
      el.classList.add('incorrect');
      el.classList.remove('correct');
      const niceName = c.answer === 'both' ? 'BOTH' : c.answer.charAt(0).toUpperCase() + c.answer.slice(1) + ' only';
      wrong.push({ text: c.text, correct: niceName });
    }
  });

  const pct = Math.round(correct / CARDS.length * 100);

  if (correct === CARDS.length) {
    // Perfect!
    fb.className = 'show';
    fb.innerHTML = `<p class="fb-score">🎯 Score: ${correct}/${CARDS.length}</p><p class="fb-perfect">✨ Outstanding! Every card is in the right place!</p>`;
    document.getElementById('venn-zones').classList.add('all-correct');
    if (!everWrong) showGoldCelebration();
    else showGreenResult();
  } else {
    everWrong = true;
    fb.className = 'show';
    let html = `<p class="fb-score">Score: ${correct}/${CARDS.length} (${pct}%)</p>`;
    html += `<p style="color:var(--muted);margin-bottom:6px;">Corrections needed:</p>`;
    wrong.forEach(w => {
      html += `<p class="fb-wrong-item">✗ "${w.text}" → should be in <strong>${w.correct}</strong></p>`;
    });
    fb.innerHTML = html;
  }

  saveState();
}

/* ── Reveal answers ─────────────────────────────────────── */
function revealAnswers() {
  const zones = {
    router: document.getElementById('zone-router'),
    both:   document.getElementById('zone-both'),
    switch: document.getElementById('zone-switch'),
  };
  CARDS.forEach(c => {
    const el = document.getElementById(c.id);
    zones[c.answer].appendChild(el);
    el.classList.add('correct');
    el.classList.remove('incorrect');
  });
  const fb = document.getElementById('feedback');
  fb.className = 'show';
  fb.innerHTML = `<p style="color:var(--gold)">💡 Answers revealed. Study the placements, then hit Reset to try again!</p>`;
}

/* ── Gold celebration ───────────────────────────────────── */
function showGoldCelebration() {
  document.body.classList.remove('bg-green');
  document.body.classList.add('bg-gold');

  let banner = document.getElementById('result-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'result-banner';
    banner.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:16px 32px;border-radius:12px;font-size:1.3rem;font-weight:700;z-index:10000;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
    document.body.appendChild(banner);
  }
  banner.style.background = '#f59e0b';
  banner.style.color = '#000';
  banner.textContent = '🏆 Perfect first time! Outstanding!';
  banner.style.display = 'block';

  // Also run existing confetti celebration
  showFireworks();

  // Canvas fireworks
  let canvas = document.getElementById('fw-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'fw-canvas';
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
    document.body.appendChild(canvas);
  }
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const particles = [];
  const colours = ['#f59e0b','#ef4444','#3b82f6','#22c55e','#a855f7','#ec4899'];
  for (let i = 0; i < 120; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height * 0.6,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      alpha: 1, colour: colours[Math.floor(Math.random() * colours.length)],
      size: 3 + Math.random() * 3
    });
  }
  let fwStart = null;
  function fwFrame(ts) {
    if (!fwStart) fwStart = ts;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.alpha -= 0.012;
      if (p.alpha <= 0) return;
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.colour;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    if (ts - fwStart < 5000) requestAnimationFrame(fwFrame);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(fwFrame);
}

/* ── Green result ───────────────────────────────────────── */
function showGreenResult() {
  document.body.classList.remove('bg-gold');
  document.body.classList.add('bg-green');

  let banner = document.getElementById('result-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'result-banner';
    banner.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:16px 32px;border-radius:12px;font-size:1.3rem;font-weight:700;z-index:10000;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
    document.body.appendChild(banner);
  }
  banner.style.background = '#22c55e';
  banner.style.color = '#fff';
  banner.textContent = '✓ All correct! Well done!';
  banner.style.display = 'block';
}

/* ── Save state ─────────────────────────────────────────── */
function saveState() {
  const cardZones = {};
  const cardClasses = {};
  CARDS.forEach(c => {
    const el = document.getElementById(c.id);
    if (!el) return;
    const parent = el.parentElement;
    // Determine which zone/pool the card is in
    if (parent && parent.dataset.zone) {
      cardZones[c.id] = parent.dataset.zone;
    } else {
      cardZones[c.id] = 'bank';
    }
    // Save correct/incorrect class state
    cardClasses[c.id] = {
      correct: el.classList.contains('correct'),
      incorrect: el.classList.contains('incorrect'),
    };
  });

  const isComplete = document.getElementById('venn-zones').classList.contains('all-correct');

  const banner = document.getElementById('result-banner');
  const bannerVisible = banner && banner.style.display !== 'none';
  const bannerContent = banner ? banner.textContent : '';
  const bannerBg = banner ? banner.style.background : '';
  const bannerColor = banner ? banner.style.color : '';

  const state = {
    everWrong,
    cardZones,
    cardClasses,
    isComplete,
    bodyBgGold: document.body.classList.contains('bg-gold'),
    bodyBgGreen: document.body.classList.contains('bg-green'),
    bannerVisible: bannerVisible || false,
    bannerContent,
    bannerBg,
    bannerColor,
  };

  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch (e) {
    // Storage unavailable — silently ignore
  }
}

/* ── Load state ─────────────────────────────────────────── */
function loadState() {
  let state;
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    state = JSON.parse(raw);
  } catch (e) {
    return false;
  }

  if (!state || !state.cardZones) return false;

  // Restore everWrong
  everWrong = !!state.everWrong;

  // Collect zone elements
  const zoneEls = {
    router: document.getElementById('zone-router'),
    both:   document.getElementById('zone-both'),
    switch: document.getElementById('zone-switch'),
    bank:   document.getElementById('bank-cards'),
  };

  // Move each card to its saved zone
  CARDS.forEach(c => {
    const el = document.getElementById(c.id);
    if (!el) return;
    const dest = state.cardZones[c.id] || 'bank';
    const target = zoneEls[dest] || zoneEls.bank;
    target.appendChild(el);

    // Restore correct/incorrect classes
    const cls = state.cardClasses && state.cardClasses[c.id];
    if (cls) {
      el.classList.toggle('correct',   !!cls.correct);
      el.classList.toggle('incorrect', !!cls.incorrect);
    }
  });

  // Restore all-correct locked state on venn zones
  if (state.isComplete) {
    document.getElementById('venn-zones').classList.add('all-correct');
  }

  // Restore body background
  document.body.classList.remove('bg-gold', 'bg-green');
  if (state.bodyBgGold)  document.body.classList.add('bg-gold');
  if (state.bodyBgGreen) document.body.classList.add('bg-green');

  // Restore banner
  if (state.bannerVisible && state.bannerContent) {
    let banner = document.getElementById('result-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'result-banner';
      banner.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:16px 32px;border-radius:12px;font-size:1.3rem;font-weight:700;z-index:10000;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
      document.body.appendChild(banner);
    }
    banner.style.background = state.bannerBg || '';
    banner.style.color = state.bannerColor || '';
    banner.textContent = state.bannerContent;
    banner.style.display = 'block';
  }

  return true;
}

/* ── Button listeners ───────────────────────────────────── */
document.getElementById('btn-check').addEventListener('click', checkAnswers);
document.getElementById('btn-reveal').addEventListener('click', revealAnswers);
document.getElementById('btn-reset').addEventListener('click', init);

/* ══════════════════════════════════════════════════════════
   CONFETTI / FIREWORKS
   ══════════════════════════════════════════════════════════ */
let confettiAnimId = null;
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

const COLORS = ['#56d97e','#2ec4b6','#ffd166','#ff6b6b','#5b9cf6','#c77dff','#ffffff'];

class Particle {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x = Math.random() * canvas.width;
    this.y = initial ? Math.random() * canvas.height - canvas.height : -10;
    this.r = Math.random() * 7 + 4;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = Math.random() * 3 + 2;
    this.spin = (Math.random() - 0.5) * 0.2;
    this.angle = Math.random() * Math.PI * 2;
    this.shape = Math.random() > 0.5 ? 'rect' : 'circle';
    this.alpha = 1;
    this.decay = Math.random() * 0.005 + 0.003;
  }
  update() {
    this.x += this.vx;
    this.vy += 0.05;
    this.y += this.vy;
    this.angle += this.spin;
    this.alpha -= this.decay;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle = this.color;
    if (this.shape === 'rect') {
      ctx.fillRect(-this.r, -this.r / 2, this.r * 2, this.r);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, this.r / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function showFireworks() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = Array.from({ length: 180 }, () => new Particle());
  document.getElementById('success-overlay').classList.add('show');
  document.getElementById('success-msg').classList.add('show');
  animateConfetti();
  setTimeout(stopConfetti, 4500);
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    if (p.y > canvas.height || p.alpha <= 0) p.reset(false);
    p.draw();
  });
  confettiAnimId = requestAnimationFrame(animateConfetti);
}

function stopConfetti() {
  if (confettiAnimId) { cancelAnimationFrame(confettiAnimId); confettiAnimId = null; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('success-overlay').classList.remove('show');
  document.getElementById('success-msg').classList.remove('show');
}

// Dismiss fireworks on click
document.getElementById('success-overlay').addEventListener('click', stopConfetti);

/* ══════════════════════════════════════════════════════════
   TOUCH DRAG & DROP (mobile support)
   ══════════════════════════════════════════════════════════ */
let touchClone = null;
let touchOrigin = null;

function touchStart(e) {
  const card = e.currentTarget;
  touchOrigin = card;
  const rect = card.getBoundingClientRect();
  touchClone = card.cloneNode(true);
  touchClone.style.cssText = `
    position: fixed;
    left: ${rect.left}px; top: ${rect.top}px;
    width: ${rect.width}px;
    opacity: 0.85;
    pointer-events: none;
    z-index: 9999;
    transition: none;
  `;
  document.body.appendChild(touchClone);
}

function touchMove(e) {
  e.preventDefault();
  if (!touchClone) return;
  const t = e.touches[0];
  const w = touchClone.offsetWidth;
  const h = touchClone.offsetHeight;
  touchClone.style.left = (t.clientX - w / 2) + 'px';
  touchClone.style.top  = (t.clientY - h / 2) + 'px';
}

function touchEnd(e) {
  if (!touchClone) return;
  const t = e.changedTouches[0];
  touchClone.remove();
  touchClone = null;

  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el?.closest('.zone') || el?.closest('#bank-cards');
  if (zone && touchOrigin) {
    zone.appendChild(touchOrigin);
    touchOrigin.classList.remove('correct','incorrect');
  }
  touchOrigin = null;
}

/* ── Go ─────────────────────────────────────────────────── */
init();
// Attempt to restore saved state; if none exists, init() already set fresh state
const restored = loadState();
// Re-wire drop zones after potential card moves from loadState
if (restored) {
  setupBank();
  ['zone-router','zone-both','zone-switch'].forEach(id =>
    setupDropZone(document.getElementById(id))
  );
}
</script>
