<script>
// ─────────────────────────────────────────
// GOOGLE CLASSROOM INTEGRATION
// ─────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const CLASSROOM_CONFIG = {
  clientId: '379663437881-iukh6qnkq8jmqtqko3qog0n6ohuhemmq.apps.googleusercontent.com',
  courseId: urlParams.get('courseId'),
  courseWorkId: urlParams.get('courseWorkId')
};

let tokenClient;
let accessToken = null;

function initTokenClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLASSROOM_CONFIG.clientId,
    scope: 'https://www.googleapis.com/auth/classroom.coursework.students',
    callback: (tokenResponse) => {
      if (tokenResponse.error !== undefined) throw (tokenResponse);
      accessToken = tokenResponse.access_token;
      document.getElementById('googleDot').classList.add('online');
      document.getElementById('googleText').textContent = 'Connected to Classroom - Results will sync.';
      document.getElementById('btnLogin').style.display = 'none';
      document.getElementById('btnLogin').classList.remove('glow-gold');
    },
  });

  if (CLASSROOM_CONFIG.courseId && CLASSROOM_CONFIG.courseWorkId && !accessToken) {
    document.getElementById('googleText').textContent = 'Login required to submit results.';
    document.getElementById('btnLogin').classList.add('glow-gold');
  }
}

function requestPermission() {
  tokenClient.requestAccessToken();
}

function verifyClassroomAuth() {
  if (CLASSROOM_CONFIG.courseId && CLASSROOM_CONFIG.courseWorkId && !accessToken) {
    alert("This assignment is linked to Google Classroom. Please click 'Sign in to Google' to record your results.");
    return false;
  }
  return true;
}

async function submitGradeToClassroom(gradePercent) {
  if (!accessToken || !CLASSROOM_CONFIG.courseId) return;

  try {
    const listUrl = `https://classroom.googleapis.com/v1/courses/${CLASSROOM_CONFIG.courseId}/courseWork/${CLASSROOM_CONFIG.courseWorkId}/studentSubmissions?userId=me`;
    const listRes = await fetch(listUrl, { headers: { 'Authorization': `Bearer ${accessToken}` } });
    const data = await listRes.json();
    if (!data.studentSubmissions || data.studentSubmissions.length === 0) return;
    const submissionId = data.studentSubmissions[0].id;

    // 1. Patch the draft grade
    const patchUrl = `https://classroom.googleapis.com/v1/courses/${CLASSROOM_CONFIG.courseId}/courseWork/${CLASSROOM_CONFIG.courseWorkId}/studentSubmissions/${submissionId}?updateMask=draftGrade`;
    await fetch(patchUrl, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ "draftGrade": gradePercent })
    });

    // 2. Post a private comment as feedback
    const commentUrl = `https://classroom.googleapis.com/v1/courses/${CLASSROOM_CONFIG.courseId}/courseWork/${CLASSROOM_CONFIG.courseWorkId}/studentSubmissions/${submissionId}/comments`;
    await fetch(commentUrl, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ "text": `Operating Systems Mind Map completed with ${gradePercent}% accuracy.` })
    });

    console.log("Classroom results synced.");
    showToast("Classroom Updated! ✅", "success");
  } catch (err) {
    console.error("Classroom sync failed:", err);
  }
}

  ['multi-purpose', 'multi', 'called'],
  // UM branch
  ['um', 'um-purpose', 'to'],
  ['um-purpose', 'upw', 'using'],
  ['um-purpose', 'far', ''],
];

// Track state per node
const state = {}; // nodeId → { correct: bool, attempts: int, mastered: bool, value: string }
let streak = 0;
let firstAttemptAllCorrect = true; // track if any mistake was made
let totalCorrect = 0;
let totalMastered = 0;

// ═══════════════════════════════════════════════
//  BUILD THE MIND MAP
// ═══════════════════════════════════════════════

const TOTAL = NODES.length; // 16

function buildMindMap() {
  const root = document.getElementById('mm-root');
  const svg = document.getElementById('mm-svg');

  // Clear
  root.querySelectorAll('.drop-zone,.fill-input,.hint-icon,.conn-label').forEach(e => e.remove());
  svg.innerHTML = '';

  // Draw connector lines
  CONNECTORS.forEach(([fromId, toId, label]) => {
    const from = fromId === 'os'
      ? { cx: 435, cy: 261 } // central node centre
      : nodeCenter(NODES.find(n => n.id === fromId));
    const to   = nodeCenter(NODES.find(n => n.id === toId));

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.cx);
    line.setAttribute('y1', from.cy);
    line.setAttribute('x2', to.cx);
    line.setAttribute('y2', to.cy);
    line.setAttribute('stroke', '#9ca3af');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '5,3');
    svg.appendChild(line);

    if (label) {
      const mx = (from.cx + to.cx) / 2;
      const my = (from.cy + to.cy) / 2;
      const lbl = document.createElement('div');
      lbl.className = 'conn-label';
      lbl.textContent = label;
      lbl.style.left = (mx - 20) + 'px';
      lbl.style.top  = (my - 8) + 'px';
      root.appendChild(lbl);
    }
  });

  // Build nodes
  NODES.forEach(node => {
    if (!state[node.id]) {
      state[node.id] = { correct: false, attempts: 0, mastered: false, value: '' };
    }
    createNodeElement(node);
    if (node.icon) createIconHint(node);
  });
}

function nodeCenter(node) {
  return { cx: node.x + node.w / 2, cy: node.y + node.h / 2 };
}

function createNodeElement(node) {
  const root = document.getElementById('mm-root');
  const s = state[node.id];

  if (s.mastered) {
    // Typed input
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'fill-input';
    inp.id = 'inp-' + node.id;
    inp.placeholder = '…';
    inp.style.cssText = `left:${node.x}px;top:${node.y}px;width:${node.w}px;height:${node.h}px;`;
    inp.value = s.value || '';
    if (s.correct) inp.classList.add('correct-fi');
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkInput(node.id); });
    inp.addEventListener('blur', () => checkInput(node.id));
    root.appendChild(inp);
  } else {
    // Drop zone
    const dz = document.createElement('div');
    dz.className = 'drop-zone awaiting';
    dz.id = 'dz-' + node.id;
    dz.style.cssText = `left:${node.x}px;top:${node.y}px;width:${node.w}px;height:${node.h}px;`;
    dz.setAttribute('data-node', node.id);
    if (s.correct) {
      dz.textContent = node.answer;
      dz.classList.remove('awaiting');
      dz.classList.add('correct-dd');
    }
    // Drag events
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleDrop(e, node.id); });
    root.appendChild(dz);
  }
}

function createIconHint(node) {
  const root = document.getElementById('mm-root');
  const el = document.createElement('div');
  el.className = 'hint-icon';
  el.id = 'icon-' + node.id;
  el.textContent = node.icon;
  el.style.left = (node.iconX || node.x + node.w + 4) + 'px';
  el.style.top  = (node.iconY || node.y + node.h / 2 - 10) + 'px';
  el.style.display = document.getElementById('hint-toggle').checked ? 'block' : 'none';
  root.appendChild(el);
}

// ═══════════════════════════════════════════════
//  WORD BANK
// ═══════════════════════════════════════════════

function buildWordBank() {
  const bank = document.getElementById('word-bank');
  bank.innerHTML = '';
  // Shuffle answers
  const answers = [...NODES.map(n => n.answer)];
  shuffle(answers);
  answers.forEach(ans => {
    // Only show tiles that aren't yet correct
    const node = NODES.find(n => n.answer === ans);
    if (node && state[node.id] && state[node.id].correct) return;
    if (node && state[node.id] && state[node.id].mastered) return;
    createTile(ans, bank);
  });
}

function createTile(text, parent) {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.textContent = text;
  tile.draggable = true;
  tile.dataset.value = text;
  tile.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', text);
    tile.classList.add('dragging');
  });
  tile.addEventListener('dragend', () => tile.classList.remove('dragging'));
  parent.appendChild(tile);
  return tile;
}

function bankDragOver(e) { e.preventDefault(); document.getElementById('word-bank').classList.add('drag-over'); }
function bankDragLeave() { document.getElementById('word-bank').classList.remove('drag-over'); }
function bankDrop(e) {
  e.preventDefault();
  document.getElementById('word-bank').classList.remove('drag-over');
  const val = e.dataTransfer.getData('text/plain');
  // If dragged back from a drop zone, clear that zone
  const node = NODES.find(n => state[n.id] && state[n.id].value === val && !state[n.id].correct);
  if (node) {
    state[node.id].value = '';
    const dz = document.getElementById('dz-' + node.id);
    if (dz) { dz.textContent = ''; dz.classList.add('awaiting'); }
  }
  createTile(val, document.getElementById('word-bank'));
}

// ═══════════════════════════════════════════════
//  DROP HANDLING
// ═══════════════════════════════════════════════

function handleDrop(e, nodeId) {
  const val = e.dataTransfer.getData('text/plain');
  const node = NODES.find(n => n.id === nodeId);
  const s = state[nodeId];
  if (s.correct) return; // already done

  // Remove tile from bank
  removeTileFromBank(val);

  // If something was already placed here, return it
  if (s.value && !s.correct) {
    createTile(s.value, document.getElementById('word-bank'));
  }

  s.value = val;
  s.attempts++;

  const dz = document.getElementById('dz-' + nodeId);
  dz.textContent = val;

  const isCorrect = normalise(val) === normalise(node.answer);
  if (isCorrect) {
    markCorrect(nodeId, 'dd');
  } else {
    firstAttemptAllCorrect = false;
    streak = 0;
    s.attempts++;
    dz.classList.remove('awaiting');
    dz.classList.add('wrong-dd');
    setTimeout(() => {
      dz.classList.remove('wrong-dd');
      dz.classList.add('awaiting');
      dz.textContent = '';
      // return tile
      createTile(val, document.getElementById('word-bank'));
      s.value = '';
    }, 800);
    showToast('Not quite — try again!', 'error');
    updateScoreboard();
  }
}

function removeTileFromBank(val) {
  const tiles = document.querySelectorAll('#word-bank .tile');
  for (const t of tiles) {
    if (t.dataset.value === val) { t.remove(); return; }
  }
}

// ═══════════════════════════════════════════════
//  INPUT CHECKING (fill-in-the-blank mode)
// ═══════════════════════════════════════════════

function checkInput(nodeId) {
  const node = NODES.find(n => n.id === nodeId);
  const s = state[nodeId];
  const inp = document.getElementById('inp-' + nodeId);
  if (!inp || s.correct) return;
  const val = inp.value.trim();
  if (!val) return;
  s.attempts++;
  s.value = val;
  const isCorrect = normalise(val) === normalise(node.answer);
  if (isCorrect) {
    markCorrect(nodeId, 'fi');
  } else {
    firstAttemptAllCorrect = false;
    streak = 0;
    inp.classList.add('wrong-fi');
    setTimeout(() => inp.classList.remove('wrong-fi'), 600);
    showToast('Not quite — check your spelling!', 'error');
    updateScoreboard();
  }
}

// ═══════════════════════════════════════════════
//  MARKING CORRECT
// ═══════════════════════════════════════════════

function markCorrect(nodeId, mode) {
  const node = NODES.find(n => n.id === nodeId);
  const s = state[node.id];
  s.correct = true;
  s.value = node.answer;
  streak++;
  totalCorrect = NODES.filter(n => state[n.id].correct).length;

  if (mode === 'dd') {
    const dz = document.getElementById('dz-' + nodeId);
    dz.classList.remove('awaiting','wrong-dd');
    dz.classList.add('correct-dd');
    dz.textContent = node.answer;
  } else {
    const inp = document.getElementById('inp-' + nodeId);
    if (inp) { inp.classList.add('correct-fi'); inp.disabled = true; }
  }

  // After 2 correct answers, graduate some nodes to text mode
  // Graduate this node for future resets (mastered after 1 correct in type mode, or 2nd time correct in dd)
  checkGraduation();
  updateScoreboard();
  updateProgress();
  saveState();

  if (totalCorrect === TOTAL) {
    setTimeout(() => celebrate(), 400);
  } else {
    const msgs = ['✓ Correct!','✓ Nice one!','✓ That\'s right!','✓ Well done!'];
    showToast(msgs[Math.floor(Math.random()*msgs.length)], 'success');
  }
}

function checkGraduation() {
  // A node graduates to text-input mode after being correct twice total
  // We store a separate 'timesCorrect' counter
  NODES.forEach(node => {
    const s = state[node.id];
    if (!s.timesCorrect) s.timesCorrect = 0;
    if (s.correct && !s._counted) {
      s.timesCorrect++;
      s._counted = true;
    }
    // Graduate after 2 correct total (across resets)
    if (s.timesCorrect >= 2 && !s.mastered) {
      s.mastered = true;
      totalMastered++;
      updateStageText();
    }
  });
  totalMastered = NODES.filter(n => state[n.id].mastered).length;
}

// ═══════════════════════════════════════════════
//  STAGE TEXT
// ═══════════════════════════════════════════════

function updateStageText() {
  const mastered = NODES.filter(n => state[n.id].mastered).length;
  const stageText = document.getElementById('stage-text');
  const stageBanner = document.getElementById('stage-banner');
  if (mastered === 0) {
    stageText.textContent = 'Stage 1 — Drag the labels from the word bank into the correct boxes on the mind map.';
    stageBanner.querySelector('.stage-icon').textContent = '🧩';
  } else if (mastered < TOTAL) {
    stageText.textContent = `Stage 2 — Some boxes are now typed recall (no word bank help). You've mastered ${mastered} / ${TOTAL}.`;
    stageBanner.querySelector('.stage-icon').textContent = '✍️';
  } else {
    stageText.textContent = 'Stage 3 — Full typed recall! Complete the entire mind map from memory.';
    stageBanner.querySelector('.stage-icon').textContent = '🧠';
  }
}

// ═══════════════════════════════════════════════
//  CHECK ALL
// ═══════════════════════════════════════════════

function checkAll() {
  if (!verifyClassroomAuth()) return;

  // For typed inputs, trigger check on all
  NODES.forEach(node => {
    const s = state[node.id];
    if (s.mastered && !s.correct) {
      checkInput(node.id);
    }
  });
  // For drop zones with filled-but-unverified (shouldn't happen, drops auto-check)
  const remaining = NODES.filter(n => !state[n.id].correct).length;
  if (remaining === 0) {
    showToast('🎉 All correct!', 'success');
  } else {
    showToast(`${TOTAL - remaining} / ${TOTAL} correct so far. Keep going!`, 'info');
  }
}

// ═══════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════

function resetActivity() {
  // Save mastery counts before reset
  NODES.forEach(node => {
    if (state[node.id]) {
      state[node.id].correct = false;
      state[node.id]._counted = false;
      state[node.id].value = '';
    }
  });
  streak = 0;
  totalCorrect = 0;
  document.body.classList.remove('all-correct','perfect');
  buildMindMap();
  buildWordBank();
  updateScoreboard();
  updateProgress();
  updateStageText();
  saveState();
}

// ═══════════════════════════════════════════════
//  REVEAL
// ═══════════════════════════════════════════════

function revealAll() {
  NODES.forEach(node => {
    if (!state[node.id].correct) {
      firstAttemptAllCorrect = false;
      state[node.id].correct = true;
      state[node.id].value = node.answer;
      const dz = document.getElementById('dz-' + node.id);
      if (dz) { dz.textContent = node.answer; dz.classList.remove('awaiting'); dz.classList.add('filled'); }
      const inp = document.getElementById('inp-' + node.id);
      if (inp) { inp.value = node.answer; inp.classList.add('correct-fi'); inp.disabled = true; }
    }
  });
  // Remove all tiles from bank
  document.getElementById('word-bank').innerHTML = '';
  totalCorrect = TOTAL;
  updateScoreboard();
  updateProgress();
  showToast('Answers revealed. Study the mind map carefully!', 'info');
}

// ═══════════════════════════════════════════════
//  HINTS TOGGLE
// ═══════════════════════════════════════════════

function toggleHints(show) {
  document.querySelectorAll('.hint-icon').forEach(el => {
    el.style.display = show ? 'block' : 'none';
  });
}

// ═══════════════════════════════════════════════
//  PROGRESS & SCOREBOARD
// ═══════════════════════════════════════════════

function updateProgress() {
  const pct = Math.round((totalCorrect / TOTAL) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${totalCorrect} / ${TOTAL} correct`;
}

function updateScoreboard() {
  document.getElementById('sc-correct').textContent = totalCorrect;
  document.getElementById('sc-mastered').textContent = NODES.filter(n => state[n.id] && state[n.id].mastered).length;
  document.getElementById('sc-streak').textContent = streak;
}

// ═══════════════════════════════════════════════
//  CELEBRATION
// ═══════════════════════════════════════════════

function celebrate() {
  if (firstAttemptAllCorrect) {
    document.body.classList.add('perfect');
    showToast('🏆 Perfect — all correct first time!', 'success');
    submitGradeToClassroom(100);
    launchConfetti();
  } else {
    document.body.classList.add('all-correct');
    showToast('✅ All correct! Great work.', 'success');
    submitGradeToClassroom(80);
    launchConfetti(false);
  }
}

function launchConfetti(gold = true) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = gold
    ? ['#fbbf24','#f97316','#fef08a','#ffffff','#a855f7']
    : ['#16a34a','#4ade80','#86efac','#ffffff','#0f1b2d'];

  const particles = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: -20,
    vx: (Math.random() - 0.5) * 4,
    vy: Math.random() * 4 + 2,
    size: Math.random() * 8 + 4,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * 360,
    rotV: (Math.random() - 0.5) * 8,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.5);
      ctx.restore();
      p.x += p.vx; p.y += p.vy;
      p.rot += p.rotV; p.vy += 0.05;
    });
    frame++;
    if (frame < 180) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════

let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════

function saveState() {
  try {
    localStorage.setItem('os-mindmap-state', JSON.stringify(state));
  } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('os-mindmap-state');
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(state, s);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════

function normalise(str) {
  return str.trim().toLowerCase().replace(/\s+/g,' ').replace(/['']/g,"'");
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════

loadState();
totalCorrect = NODES.filter(n => state[n.id] && state[n.id].correct).length;
totalMastered = NODES.filter(n => state[n.id] && state[n.id].mastered).length;
buildMindMap();
buildWordBank();
updateScoreboard();
updateProgress();
updateStageText();
</script>
</body>
</html>
